<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSwap — Video Call</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--bg-card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--border-hover:rgba(139,92,246,0.3);--text-muted:rgba(255,255,255,0.32);--sidebar-w:240px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;overflow:hidden;cursor:none;}
#ss-cursor{position:fixed;width:10px;height:10px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
#ss-ring{position:fixed;width:34px;height:34px;border:1px solid rgba(255,255,255,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .2s;}
.sidebar{width:var(--sidebar-w);height:100vh;background:rgba(255,255,255,0.015);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 14px;position:fixed;left:0;top:0;z-index:100;overflow-y:auto;}
.sidebar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px;margin-bottom:32px;padding-left:8px;}
.logo-sq{width:9px;height:9px;background:#fff;border-radius:2px;flex-shrink:0;}
.nav-section{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin:18px 0 5px;padding-left:10px;}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;color:rgba(255,255,255,0.42);text-decoration:none;font-size:.875rem;transition:all .15s;margin-bottom:1px;border:1px solid transparent;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.04);}
.nav-link.active{color:#fff;background:rgba(255,255,255,0.06);border-color:var(--border);}
.nav-link svg{width:15px;height:15px;flex-shrink:0;opacity:.7;}
.nav-link.active svg,.nav-link:hover svg{opacity:1;}
.sidebar-bottom{margin-top:auto;border-top:1px solid var(--border);padding-top:14px;}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:8px;}
.user-avatar-sm{width:30px;height:30px;border-radius:50%;background:rgba(139,92,246,0.18);border:1px solid rgba(139,92,246,0.3);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;overflow:hidden;color:rgba(167,139,250,0.9);}
.user-name-sm{font-size:.82rem;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,0.65);}
.sidebar-logout-full{width:100%;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.14);border-radius:10px;color:rgba(239,68,68,0.7);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;padding:9px 12px;cursor:none;display:flex;align-items:center;gap:8px;transition:all .2s;}
.sidebar-logout-full:hover{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.28);color:#f87171;}
.sidebar-logout-full svg{width:14px;height:14px;}
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:8px;cursor:none;color:#fff;}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);z-index:98;}
.sidebar-overlay.show{display:block;}

/* CALL AREA */
.call-wrap{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* TOP BAR */
.call-bar{display:flex;align-items:center;gap:14px;padding:12px 20px;background:rgba(8,8,8,0.96);border-bottom:1px solid var(--border);flex-shrink:0;backdrop-filter:blur(12px);z-index:10;}
.call-live-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;flex-shrink:0;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.call-room-label{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px;}
.call-status-text{font-size:.75rem;color:rgba(134,239,172,0.8);}
.call-timer{font-size:.78rem;color:var(--text-muted);margin-left:2px;}
.btn-end{margin-left:auto;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:8px 18px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:none;transition:all .2s;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-end:hover{background:rgba(239,68,68,0.28);color:#fff;}
.btn-end svg{width:12px;height:12px;}

/* IFRAME */
#call-frame{flex:1;width:100%;border:none;background:#000;}

/* NO ROOM STATE */
.no-room{margin-left:var(--sidebar-w);flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:40px;}
.no-room-icon{width:56px;height:56px;background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);border-radius:16px;display:flex;align-items:center;justify-content:center;}
.no-room-icon svg{width:24px;height:24px;color:rgba(167,139,250,0.6);}
.no-room h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;text-align:center;}
.no-room p{color:var(--text-muted);font-size:.9rem;text-align:center;max-width:360px;line-height:1.6;}
.btn-white{display:inline-flex;align-items:center;gap:7px;background:#fff;color:#080808;padding:11px 22px;border-radius:11px;font-family:'Syne',sans-serif;font-size:.84rem;font-weight:700;text-decoration:none;transition:opacity .2s;}
.btn-white:hover{opacity:.88;}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .3s;background:#0e0e0e !important;border-right:1px solid rgba(255,255,255,0.1) !important;}
  .sidebar.open{transform:translateX(0);}
  .sidebar .nav-link{color:#fff;opacity:1;}
  .call-wrap,.no-room{margin-left:0;}
  .hamburger{display:flex;}
  .call-bar{padding:10px 14px;padding-left:56px;}
  .call-room-label{max-width:120px;}
}
</style>
</head>
<body>
<div id="ss-cursor"></div><div id="ss-ring"></div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>

<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-logo"><div class="logo-sq"></div>SkillSwap</a>
  <span class="nav-section">Main</span>
  <a href="dashboard.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
  <a href="profile.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Profile</a>
  <a href="discover.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>Discover</a>
  <span class="nav-section">Social</span>
  <a href="matches.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Matches</a>
  <a href="messages.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages</a>
  <a href="videocall.html" class="nav-link active"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>Video Call</a>
  <span class="nav-section">More</span>
  <a href="webinars.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Webinars</a>
  <a href="analytics.html" class="nav-link" id="analyticsNavLink" style="display:none;"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics</a>
  <a href="pricing.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Upgrade</a>
  <div class="sidebar-bottom">
    <div class="user-pill"><div class="user-avatar-sm" id="sidebarAvatar"></div><span class="user-name-sm" id="sidebarName">Loading...</span></div>
    <button class="sidebar-logout-full" onclick="handleLogout()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</button>
  </div>
</aside>

<!-- CALL VIEW (shown when ?room= param exists) -->
<div class="call-wrap" id="callWrap" style="display:none;flex-direction:column;">
  <div class="call-bar">
    <div class="call-live-dot"></div>
    <div class="call-room-label" id="callRoomLabel">Live</div>
    <div class="call-status-text">Live</div>
    <span class="call-timer" id="callTimer">0:00</span>
    <button class="btn-end" onclick="endCall()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>End Call</button>
  </div>
  <iframe id="call-frame" src="" allow="camera;microphone;fullscreen;display-capture;autoplay" allowfullscreen></iframe>
</div>

<!-- NO ROOM STATE (shown when no ?room= param) -->
<div class="no-room" id="noRoomState">
  <div class="no-room-icon"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div>
  <h2>No call in progress</h2>
  <p>Start a call from a match or join a call via the invite link your partner sent you in Messages.</p>
  <a href="matches.html" class="btn-white"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Go to Matches</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const{createClient}=supabase;
const sb=createClient('https://vgndpvkywvcnezvjuueq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnbmRwdmt5d3ZjbmV6dmp1dWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDk5OTEsImV4cCI6MjA5MDA4NTk5MX0.GGwx_-W7pu485h3d6dgkhqSwiqxT3Hx02Ck9HW8nyE0');

const cur=document.getElementById('ss-cursor'),ring=document.getElementById('ss-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>{ring.style.borderColor='rgba(139,92,246,0.6)';ring.style.width='44px';ring.style.height='44px';});el.addEventListener('mouseleave',()=>{ring.style.borderColor='rgba(255,255,255,0.5)';ring.style.width='34px';ring.style.height='34px';});});
(function anim(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim);})();
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('show');}
async function handleLogout(){await sb.auth.signOut();window.location.href='index.html';}

let currentUserId=null,callStartTime=null,callTimerInterval=null;

async function endCall(){
  clearInterval(callTimerInterval);
  const durationMinutes=callStartTime?Math.max(1,Math.floor((Date.now()-callStartTime)/60000)):1;
  document.getElementById('call-frame').src='';
  // Log session
  if(currentUserId){
    const{error}=await sb.from('sessions').insert({user_id:currentUserId,duration_minutes:durationMinutes});
    if(error)console.error('Session log error:',error);
  }
  callStartTime=null;
  window.location.href='matches.html';
}

window.addEventListener('beforeunload',()=>{
  if(callStartTime&&currentUserId){
    const durationMinutes=Math.max(1,Math.floor((Date.now()-callStartTime)/60000));
    sb.from('sessions').insert({user_id:currentUserId,duration_minutes:durationMinutes});
  }
});

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  currentUserId=session.user.id;
  const{data:profile,error:pErr}=await sb.from('profiles').select('full_name,username,avatar_url,avatar_emoji,plan').eq('id',currentUserId).single();
  if(pErr)console.error('Profile error:',pErr);
  const name=profile?.full_name||profile?.username||session.user.email.split('@')[0];
  document.getElementById('sidebarName').textContent=name;
  const avatarEl=document.getElementById('sidebarAvatar');
  if(profile?.avatar_url){avatarEl.innerHTML=`<img src="${profile.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;}
  else if(profile?.avatar_emoji){avatarEl.textContent=profile.avatar_emoji;}
  else{avatarEl.textContent=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);}
  if(profile?.plan==='pro'||profile?.plan==='creator'){document.getElementById('analyticsNavLink').style.display='flex';}

  // Read ?room= param
  const params=new URLSearchParams(window.location.search);
  const roomUrl=params.get('room');

  if(!roomUrl){
    document.getElementById('noRoomState').style.display='flex';
    return;
  }

  // Load call view
  document.getElementById('noRoomState').style.display='none';
  const callWrap=document.getElementById('callWrap');
  callWrap.style.display='flex';

  // Set room label to domain/room-name portion only
  try{
    const u=new URL(roomUrl);
    document.getElementById('callRoomLabel').textContent=u.hostname+u.pathname;
  }catch{
    document.getElementById('callRoomLabel').textContent='Live Call';
  }

  // Load Daily prebuilt iframe
  document.getElementById('call-frame').src=roomUrl;

  // Start timer
  callStartTime=Date.now();
  callTimerInterval=setInterval(()=>{
    const sec=Math.floor((Date.now()-callStartTime)/1000);
    const m=Math.floor(sec/60),s=sec%60;
    document.getElementById('callTimer').textContent=m+':'+(s<10?'0':'')+s;
  },1000);
}

init();
</script>
</body>
</html>
