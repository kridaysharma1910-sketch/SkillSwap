<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSwap — Matches</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--bg-card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--border-hover:rgba(139,92,246,0.3);--text-muted:rgba(255,255,255,0.32);--sidebar-w:240px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;overflow-x:hidden;cursor:none;}
#ss-cursor{position:fixed;width:10px;height:10px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
#ss-ring{position:fixed;width:34px;height:34px;border:1px solid rgba(255,255,255,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .2s;}
.sidebar{width:var(--sidebar-w);height:100vh;background:rgba(255,255,255,0.015);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 14px;position:fixed;left:0;top:0;z-index:100;overflow-y:auto;}
.sidebar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px;margin-bottom:32px;padding-left:8px;}
.logo-sq{width:9px;height:9px;background:#fff;border-radius:2px;flex-shrink:0;}
.nav-section{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin:18px 0 5px;padding-left:10px;}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;color:rgba(255,255,255,0.42);text-decoration:none;font-size:.875rem;transition:all .15s;margin-bottom:1px;border:1px solid transparent;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.04);}
.nav-link.active{color:#fff;background:rgba(255,255,255,0.06);border-color:var(--border);}
.nav-link svg{width:15px;height:15px;flex-shrink:0;opacity:.7;}
.nav-link.active svg,.nav-link:hover svg{opacity:1;}
.sidebar-bottom{margin-top:auto;border-top:1px solid var(--border);padding-top:14px;}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:8px;}
.user-avatar-sm{width:30px;height:30px;border-radius:50%;background:rgba(139,92,246,0.18);border:1px solid rgba(139,92,246,0.3);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;overflow:hidden;color:rgba(167,139,250,0.9);}
.user-name-sm{font-size:.82rem;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,0.65);}
.sidebar-logout-full{width:100%;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.14);border-radius:10px;color:rgba(239,68,68,0.7);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;padding:9px 12px;cursor:none;display:flex;align-items:center;gap:8px;transition:all .2s;}
.sidebar-logout-full:hover{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.28);color:#f87171;}
.sidebar-logout-full svg{width:14px;height:14px;}
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:8px;cursor:none;color:#fff;}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);z-index:98;}
.sidebar-overlay.show{display:block;}
.main{margin-left:var(--sidebar-w);flex:1;padding:40px 48px;min-height:100vh;}
.page-header{margin-bottom:28px;}
.page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.9rem;letter-spacing:-.03em;}
.page-sub{color:var(--text-muted);font-size:.9rem;margin-top:5px;}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:28px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:5px;}
.tab-btn{background:none;border:none;color:rgba(255,255,255,0.38);font-family:'DM Sans',sans-serif;font-size:.875rem;padding:8px 16px;cursor:none;transition:all .2s;border-radius:10px;display:flex;align-items:center;gap:6px;}
.tab-btn:hover{color:rgba(255,255,255,0.7);}
.tab-btn.active{color:#fff;background:rgba(255,255,255,0.07);}
.tab-count{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);font-size:.7rem;padding:2px 7px;border-radius:100px;}
.tab-btn.active .tab-count{background:rgba(139,92,246,0.2);color:rgba(167,139,250,0.8);}

/* MATCH CARD */
.match-list{display:flex;flex-direction:column;gap:14px;}
.match-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:20px 22px;display:flex;align-items:center;gap:16px;transition:border-color .2s,transform .2s;backdrop-filter:blur(12px);animation:fadeUp .35s ease both;position:relative;}
.match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,0),transparent);transition:background .3s;}
.match-card:hover{border-color:var(--border-hover);transform:translateX(3px);}
.match-card:hover::before{background:linear-gradient(90deg,transparent,rgba(139,92,246,0.5),transparent);}
.match-avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.2);color:rgba(167,139,250,0.8);overflow:hidden;}
.match-body{flex:1;min-width:0;}
.match-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;margin-bottom:4px;}
.match-swap{font-size:.78rem;color:var(--text-muted);margin-bottom:8px;}
.match-tags{display:flex;gap:5px;flex-wrap:wrap;}
.mtag{padding:3px 9px;border-radius:100px;font-size:.72rem;}
.mtag-v{border:1px solid rgba(139,92,246,0.35);color:rgba(167,139,250,0.7);}
.mtag-c{border:1px solid rgba(34,211,238,0.28);color:rgba(103,232,249,0.65);}
.match-meta{display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0;}
.match-date{font-size:.72rem;color:var(--text-muted);}
.status-badge{font-size:.7rem;padding:3px 10px;border-radius:100px;font-weight:500;}
.s-pending{background:rgba(251,191,36,0.1);color:#fcd34d;border:1px solid rgba(251,191,36,0.25);}
.s-accepted{background:rgba(34,197,94,0.1);color:#86efac;border:1px solid rgba(34,197,94,0.2);}
.s-rejected{background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);}
.s-completed{background:rgba(139,92,246,0.1);color:rgba(167,139,250,0.8);border:1px solid rgba(139,92,246,0.25);}
.match-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn-accept{background:#fff;color:#080808;padding:8px 15px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:700;border:none;cursor:none;transition:opacity .2s;}
.btn-accept:hover{opacity:.85;}
.btn-decline{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:rgba(239,68,68,0.7);padding:8px 15px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:none;transition:all .2s;}
.btn-decline:hover{background:rgba(239,68,68,0.12);color:#f87171;}
.btn-action{background:var(--bg-card);border:1px solid var(--border);color:rgba(255,255,255,0.55);padding:8px 14px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:none;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.btn-action:hover{border-color:rgba(255,255,255,0.14);color:#fff;}
.btn-action svg{width:12px;height:12px;}
.empty-state{text-align:center;padding:44px 20px;color:var(--text-muted);}
.empty-state p{font-size:.88rem;margin-bottom:16px;line-height:1.5;}
.btn-white{display:inline-flex;align-items:center;gap:7px;background:#fff;color:#080808;padding:10px 20px;border-radius:10px;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;text-decoration:none;transition:opacity .2s;}
.btn-white:hover{opacity:.88;}
.toast{position:fixed;bottom:24px;right:24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:12px 20px;border-radius:12px;font-size:.85rem;z-index:9000;animation:fadeUp .3s ease;backdrop-filter:blur(12px);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:900px){.sidebar{transform:translateX(-100%);transition:transform .3s;background:#0e0e0e !important;border-right:1px solid rgba(255,255,255,0.1) !important;}.sidebar.open{transform:translateX(0);}.sidebar .nav-link{color:#fff;opacity:1;}.main{margin-left:0;padding:24px 20px;padding-top:56px;}.hamburger{display:flex;}.match-card{flex-wrap:wrap;}.match-meta{width:100%;flex-direction:row;justify-content:space-between;align-items:center;}}
</style>
</head>
<body>
<div id="ss-cursor"></div><div id="ss-ring"></div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>

<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-logo"><div class="logo-sq"></div>SkillSwap</a>
  <span class="nav-section">Main</span>
  <a href="dashboard.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
  <a href="profile.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Profile</a>

  <a href="messages.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages</a>
  <a href="videocall.html" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>Video Call</a>

  <div class="sidebar-bottom">
    <div class="user-pill"><div class="user-avatar-sm" id="sidebarAvatar"></div><span class="user-name-sm" id="sidebarName">Loading...</span></div>
    <button class="sidebar-logout-full" onclick="handleLogout()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</button>

</aside>

<main class="main">
  <div class="page-header">
    <h1 class="page-title">Matches</h1>
    <p class="page-sub">Manage your swap requests and active connections.</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('requests')" id="tab-requests">
      Incoming <span class="tab-count" id="cnt-requests">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('sent')" id="tab-sent">
      Sent <span class="tab-count" id="cnt-sent">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('active')" id="tab-active">
      Active <span class="tab-count" id="cnt-active">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('completed')" id="tab-completed">
      Completed <span class="tab-count" id="cnt-completed">0</span>
    </button>
  </div>

  <div id="tabContent">
    <div class="match-list" id="matchList"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const{createClient}=supabase;
const sb=createClient('https://vgndpvkywvcnezvjuueq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnbmRwdmt5d3ZjbmV6dmp1dWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDk5OTEsImV4cCI6MjA5MDA4NTk5MX0.GGwx_-W7pu485h3d6dgkhqSwiqxT3Hx02Ck9HW8nyE0');

const cur=document.getElementById('ss-cursor'),ring=document.getElementById('ss-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>{ring.style.borderColor='rgba(139,92,246,0.6)';ring.style.width='44px';ring.style.height='44px';});el.addEventListener('mouseleave',()=>{ring.style.borderColor='rgba(255,255,255,0.5)';ring.style.width='34px';ring.style.height='34px';});});
(function anim(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim);})();

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('show');}
async function handleLogout(){await sb.auth.signOut();window.location.href='index.html';}

function genRoomId(){return Math.random().toString(36).slice(2,9)+Math.random().toString(36).slice(2,9);}

// Insert a call_invite row — receiver's call-notify.js picks it up via postgres_changes
async function broadcastCallInvite(peerId,payload){
  const{roomId,matchId,callerName,callerAvatar}=payload;
  const{error}=await sb.from('call_invites').insert({
    room_id:roomId,
    match_id:matchId||null,
    caller_id:currentUserId,
    callee_id:peerId,
    caller_name:callerName,
    caller_avatar:callerAvatar,
    status:'pending'
  });
  if(error) console.error('call_invite insert error:',error);
}

async function startWebRTCCall(matchId,partnerId){
  const btn=document.getElementById('call-btn-'+matchId);
  if(btn){btn.textContent='Starting...';btn.disabled=true;}
  const roomId=genRoomId();
  const{error}=await sb.from('messages').insert({match_id:matchId,sender_id:currentUserId,content:'CALL_INVITE::'+roomId});
  if(error){console.error('CALL_INVITE insert error:',error);showToast('Error sending call invite');if(btn){btn.textContent='Start Call';btn.disabled=false;}return;}
  if(partnerId){
    const{data:me}=await sb.from('profiles').select('full_name,avatar_url').eq('id',currentUserId).single();
    await broadcastCallInvite(partnerId,{roomId,matchId,callerName:me?.full_name||'Someone',callerAvatar:me?.avatar_url||null});
  }
  window.location.href='videocall.html?room='+encodeURIComponent(roomId)+'&match='+matchId+'&caller=1';
}

function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},3000);}

let currentUserId=null;
let allData={requests:[],sent:[],active:[],completed:[]};
let currentTab='requests';

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderTab(tab);
}

function formatDate(d){return d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}

function avatarHtml(p){
  if(p?.avatar_url)return`<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  const n=p?.full_name||p?.username||'?';
  return n.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
}

function renderTab(tab){
  const list=document.getElementById('matchList');
  const items=allData[tab]||[];
  if(!items.length){
    const msgs={requests:'No incoming requests yet.',sent:'No requests sent yet.',active:'No active matches yet.',completed:'No completed swaps yet.'};
    list.innerHTML=`<div class="empty-state"><p>${msgs[tab]}</p>${tab==='active'||tab==='sent'?`<a href="discover.html" class="btn-white"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>Discover People</a>`:''}</div>`;
    return;
  }
  list.innerHTML=items.map((m,i)=>{
    const isSender=m.sender_id===currentUserId;
    const peer=isSender?m.receiver:m.sender;
    const peerName=peer?.full_name||peer?.username||'Skill Swapper';
    const offered=(peer?.skills_offering||peer?.skills_offered||[]).slice(0,3);
    const swap=`${m.skill_offered||'?'} ↔ ${m.skill_wanted||'?'}`;
    const statusLabels={pending:'Pending',accepted:'Active',rejected:'Declined',completed:'Done'};
    const statusClasses={pending:'s-pending',accepted:'s-accepted',rejected:'s-rejected',completed:'s-completed'};
    let actionsHtml='';
    if(tab==='requests'){
      actionsHtml=`<button class="btn-accept" onclick="respond('${m.id}','accepted')">Accept</button><button class="btn-decline" onclick="respond('${m.id}','rejected')">Decline</button>`;
    } else if(tab==='active'){
      const peerId=m.sender_id===currentUserId?m.receiver_id:m.sender_id;
      actionsHtml=`<a href="messages.html?match=${m.id}" class="btn-action"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Message</a><button class="btn-action" id="call-btn-${m.id}" onclick="startWebRTCCall('${m.id}','${peerId}')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>Start Call</button><button class="btn-action" onclick="complete('${m.id}')">Mark Done</button>`;
    }
    return`<div class="match-card" style="animation-delay:${i*.04}s">
      <div class="match-avatar">${avatarHtml(peer)}</div>
      <div class="match-body">
        <div class="match-name">${peerName}</div>
        <div class="match-swap">${swap}</div>
        <div class="match-tags">${offered.map(s=>`<span class="mtag mtag-v">${s}</span>`).join('')}</div>
      </div>
      <div class="match-meta">
        <span class="match-date">${formatDate(m.created_at)}</span>
        <span class="status-badge ${statusClasses[m.status]||'s-pending'}">${statusLabels[m.status]||m.status}</span>
        <div class="match-actions">${actionsHtml}</div>
      </div>
    </div>`;
  }).join('');
}

async function respond(matchId,action){
  const{error}=await sb.from('matches').update({status:action,updated_at:new Date().toISOString()}).eq('id',matchId);
  if(error){console.error('Respond error:',error);showToast('Error: '+error.message);}
  else{showToast(action==='accepted'?'Match accepted!':'Request declined.');await loadMatches();}
}

async function complete(matchId){
  const{error}=await sb.from('matches').update({status:'completed',updated_at:new Date().toISOString()}).eq('id',matchId);
  if(error){console.error('Complete error:',error);showToast('Error: '+error.message);}
  else{showToast('Swap marked as completed!');await loadMatches();}
}

async function loadMatches(){
  const{data,error}=await sb.from('matches')
    .select(`*, sender:profiles!matches_sender_id_fkey(full_name,avatar_url,skills_offering,skills_offered), receiver:profiles!matches_receiver_id_fkey(full_name,avatar_url,skills_offering,skills_offered)`)
    .or(`sender_id.eq.${currentUserId},receiver_id.eq.${currentUserId}`)
    .order('created_at',{ascending:false});
  if(error){console.error('Load matches error:',error);}
  const matches=data||[];
  allData.requests=matches.filter(m=>m.receiver_id===currentUserId&&m.status==='pending');
  allData.sent=matches.filter(m=>m.sender_id===currentUserId&&m.status==='pending');
  allData.active=matches.filter(m=>m.status==='accepted');
  allData.completed=matches.filter(m=>m.status==='completed');
  document.getElementById('cnt-requests').textContent=allData.requests.length;
  document.getElementById('cnt-sent').textContent=allData.sent.length;
  document.getElementById('cnt-active').textContent=allData.active.length;
  document.getElementById('cnt-completed').textContent=allData.completed.length;
  renderTab(currentTab);
}

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  currentUserId=session.user.id;
  const{data:me}=await sb.from('profiles').select('full_name,username,avatar_url').eq('id',currentUserId).single();
  const name=me?.full_name||me?.username||session.user.email.split('@')[0];
  document.getElementById('sidebarName').textContent=name;
  const avatarEl=document.getElementById('sidebarAvatar');
  if(me?.avatar_url){avatarEl.innerHTML=`<img src="${me.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;}
  else{avatarEl.textContent=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);}
  await loadMatches();
}

init();
</script>
<script src="call-notify.js"></script>
</body>
