<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSwap — Discover</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #05040a;
    --purple-deep: #0d0a1a;
    --purple-mid: #1a1035;
    --purple-bright: #7c3aed;
    --purple-glow: #9d5cff;
    --purple-soft: #c4a8ff;
    --accent: #ff6bff;
    --white: #f0ecff;
    --text-muted: #7a6d99;
    --border: rgba(124, 58, 237, 0.2);
    --sidebar-w: 240px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; overflow-x: hidden; cursor: none; }

  .cursor { position: fixed; width: 12px; height: 12px; background: var(--purple-glow); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s; mix-blend-mode: screen; }
  .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(157,92,255,0.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: transform 0.15s ease; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--purple-deep); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 28px 20px; position: fixed; left: 0; top: 0; z-index: 100; }
  .sidebar-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);} }
  .nav-section { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; margin-top: 24px; padding-left: 12px; }
  .nav-link { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: all 0.2s; margin-bottom: 2px; }
  .nav-link:hover { color: var(--white); background: rgba(124,58,237,0.1); }
  .nav-link.active { color: var(--white); background: rgba(124,58,237,0.15); border: 1px solid var(--border); }
  .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px; }
  .user-pill { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: none; transition: background 0.2s; }
  .user-pill:hover { background: rgba(124,58,237,0.1); }
  .user-avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--purple-bright), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
  .user-name-sm { font-size: 0.85rem; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .logout-btn { background: none; border: none; color: var(--text-muted); cursor: none; font-size: 1rem; padding: 4px; transition: color 0.2s; flex-shrink: 0; }
  .logout-btn:hover { color: #ef4444; }

  /* MAIN */
  .main { margin-left: var(--sidebar-w); flex: 1; padding: 40px 48px; min-height: 100vh; }
  .page-header { margin-bottom: 28px; }
  .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; letter-spacing: -0.03em; }
  .page-title span { background: linear-gradient(135deg, var(--purple-glow), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .page-sub { color: var(--text-muted); font-size: 0.92rem; margin-top: 6px; }

  /* SEARCH + FILTERS */
  .search-bar {
    display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap;
  }
  .search-input-wrap {
    flex: 1; min-width: 240px; position: relative;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none;
  }
  .search-input {
    width: 100%; background: rgba(124,58,237,0.06); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px 12px 42px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
    outline: none; transition: border-color 0.2s, background 0.2s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--purple-bright); background: rgba(124,58,237,0.1); }
  .filter-select {
    background: rgba(124,58,237,0.06); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    outline: none; cursor: none; transition: border-color 0.2s;
  }
  .filter-select:focus { border-color: var(--purple-bright); }
  .filter-select option { background: var(--purple-mid); }

  /* RESULTS INFO */
  .results-info {
    font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;
  }
  .results-info strong { color: var(--white); }

  /* CARDS GRID */
  .cards-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;
  }

  /* USER CARD */
  .user-card {
    background: var(--purple-deep); border: 1px solid var(--border); border-radius: 18px;
    padding: 24px; display: flex; flex-direction: column; gap: 0;
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.4s ease both;
  }
  .user-card:hover {
    border-color: rgba(124,58,237,0.45); transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(124,58,237,0.15);
  }
  .card-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
  .card-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-bright), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; flex-shrink: 0; border: 2px solid var(--border);
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.98rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-location { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px; }
  .card-availability {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.72rem; color: #86efac;
    background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
    padding: 3px 9px; border-radius: 100px;
  }
  .card-bio { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .skills-section { margin-bottom: 14px; }
  .skill-section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 7px; }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .skill-tag { padding: 4px 11px; border-radius: 100px; font-size: 0.78rem; border: 1px solid var(--border); color: var(--purple-soft); background: rgba(124,58,237,0.08); }
  .skill-tag.want { background: rgba(255,107,255,0.08); border-color: rgba(255,107,255,0.25); color: #f0b8ff; }
  .card-actions { display: flex; gap: 10px; margin-top: 4px; }
  .btn-connect {
    flex: 1; background: linear-gradient(135deg, var(--purple-bright), #a855f7);
    color: white; padding: 10px; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
    border: none; cursor: none; transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(124,58,237,0.3);
  }
  .btn-connect:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,0.4); }
  .btn-connect:disabled { opacity: 0.5; transform: none; cursor: default; }
  .btn-connect.sent { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; box-shadow: none; }
  .btn-view {
    background: rgba(124,58,237,0.1); border: 1px solid var(--border); color: var(--purple-soft);
    padding: 10px 14px; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; cursor: none; transition: all 0.2s;
  }
  .btn-view:hover { background: rgba(124,58,237,0.2); border-color: rgba(124,58,237,0.4); color: var(--white); }

  /* MATCH SCORE */
  .match-score {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75rem; color: var(--accent); margin-bottom: 14px;
  }
  .score-bar { flex: 1; height: 4px; background: rgba(124,58,237,0.2); border-radius: 100px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--purple-bright), var(--accent)); }

  /* EMPTY + LOADING */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--white); margin-bottom: 8px; }
  .empty-state p { font-size: 0.88rem; margin-bottom: 20px; max-width: 360px; margin-left: auto; margin-right: auto; }
  .btn-sm { display: inline-block; background: linear-gradient(135deg, var(--purple-bright), #a855f7); color: white; padding: 10px 22px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; text-decoration: none; border: none; cursor: none; transition: all 0.2s; box-shadow: 0 4px 16px rgba(124,58,237,0.3); }
  .btn-sm:hover { transform: translateY(-1px); }

  .skeleton-card { background: var(--purple-deep); border: 1px solid var(--border); border-radius: 18px; padding: 24px; }
  .skel { background: linear-gradient(90deg, rgba(124,58,237,0.1) 25%, rgba(124,58,237,0.2) 50%, rgba(124,58,237,0.1) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  /* LOAD MORE */
  .load-more-wrap { text-align: center; margin-top: 32px; margin-bottom: 20px; }

  /* ALERT TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 500;
    background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac;
    padding: 12px 20px; border-radius: 12px; font-size: 0.88rem;
    animation: fadeUp 0.3s ease;
    transition: opacity 0.3s;
  }
  .toast.error { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #fca5a5; }

  /* MOBILE */
  .hamburger { display: none; }
  @media (max-width: 900px) {
    .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; padding: 24px 20px; padding-top: 70px; }
    .hamburger { display: flex; position: fixed; top: 16px; left: 16px; z-index: 200; background: var(--purple-deep); border: 1px solid var(--border); border-radius: 10px; padding: 8px; cursor: none; color: var(--white); font-size: 1.2rem; }
  }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://vgndpvkywvcnezvjuueq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnbmRwdmt5d3ZjbmV6dmp1dWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDk5OTEsImV4cCI6MjA5MDA4NTk5MX0.GGwx_-W7pu485h3d6dgkhqSwiqxT3Hx02Ck9HW8nyE0'
);

// Cursor
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.left = mouseX + 'px'; cursor.style.top = mouseY + 'px';
});
function animateRing() {
  ringX += (mouseX - ringX) * 0.12; ringY += (mouseY - ringY) * 0.12;
  ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

let currentUserId = null;
let mySkillsWanted = [];
let allProfiles = [];
let filtered = [];
let sentRequests = new Set();
const PAGE_SIZE = 12;
let page = 0;

// Toast
function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

// Compute match score: how many of their offered overlap with what I want, and vice versa
function matchScore(profile) {
  const theyOffer = (profile.skills_offered || []).map(s => s.toLowerCase());
  const theyWant = (profile.skills_wanted || []).map(s => s.toLowerCase());
  const iWant = mySkillsWanted.map(s => s.toLowerCase());
  let score = 0;
  iWant.forEach(s => { if (theyOffer.includes(s)) score += 2; });
  // bonus if they want something I might offer (we don't track myOffered here, so use partial)
  theyWant.forEach(s => { if (iWant.some(w => w.includes(s) || s.includes(w))) score += 0.5; });
  return Math.min(score / Math.max(iWant.length * 2, 1), 1);
}

function renderCard(p, idx) {
  const name = p.full_name || p.username || 'SkillSwapper';
  const avatar = p.avatar_emoji || '👤';
  const location = p.location ? `📍 ${p.location}` : '';
  const bio = p.bio || 'No bio yet.';
  const offered = (p.skills_offered || []).slice(0, 4);
  const wanted = (p.skills_wanted || []).slice(0, 3);
  const score = matchScore(p);
  const scorePct = Math.round(score * 100);
  const isSent = sentRequests.has(p.id);
  const delay = (idx % PAGE_SIZE) * 0.05;

  return `
    <div class="user-card" style="animation-delay:${delay}s">
      <div class="card-top">
        <div class="card-avatar">${avatar}</div>
        <div class="card-meta">
          <div class="card-name">${name}</div>
          ${location ? `<div class="card-location">${location}</div>` : ''}
          ${p.hours_per_week ? `<div class="card-availability">🟢 ${p.hours_per_week}h/wk</div>` : ''}
        </div>
      </div>
      ${scorePct > 0 ? `
        <div class="match-score">
          <span>⚡ ${scorePct}% match</span>
          <div class="score-bar"><div class="score-fill" style="width:${scorePct}%"></div></div>
        </div>` : ''}
      <div class="card-bio">${bio}</div>
      <div class="skills-section">
        ${offered.length ? `
          <div class="skill-section-label">Offers</div>
          <div class="skill-tags">${offered.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>` : ''}
        ${wanted.length ? `
          <div class="skill-section-label">Wants to learn</div>
          <div class="skill-tags">${wanted.map(s => `<span class="skill-tag want">${s}</span>`).join('')}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn-connect${isSent ? ' sent' : ''}" id="btn-${p.id}" onclick="sendRequest('${p.id}')" ${isSent ? 'disabled' : ''}>
          ${isSent ? '✓ Request sent' : '🤝 Request swap'}
        </button>
      </div>
    </div>
  `;
}

function renderGrid(profiles, append = false) {
  const grid = document.getElementById('cardsGrid');
  if (!append) grid.innerHTML = '';

  if (profiles.length === 0 && !append) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🌌</div>
        <h3>No one found</h3>
        <p>Try a different search or filter — or be the first to add those skills.</p>
        <a href="profile.html" class="btn-sm">Add my skills →</a>
      </div>`;
    document.getElementById('loadMoreWrap').style.display = 'none';
    return;
  }

  grid.insertAdjacentHTML('beforeend', profiles.map((p, i) => renderCard(p, i)).join(''));
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const offeringFilter = document.getElementById('filterOffering').value.toLowerCase();
  const formatFilter = document.getElementById('filterFormat').value;

  filtered = allProfiles.filter(p => {
    const name = (p.full_name || p.username || '').toLowerCase();
    const bio = (p.bio || '').toLowerCase();
    const offered = (p.skills_offered || []).map(s => s.toLowerCase());
    const wanted = (p.skills_wanted || []).map(s => s.toLowerCase());
    const allText = [name, bio, ...offered, ...wanted].join(' ');

    if (q && !allText.includes(q)) return false;
    if (offeringFilter && !offered.some(s => s.includes(offeringFilter))) return false;
    if (formatFilter && p.session_format && p.session_format !== formatFilter && p.session_format !== 'both') return false;
    return true;
  });

  // Sort by match score descending
  filtered.sort((a, b) => matchScore(b) - matchScore(a));

  page = 0;
  const slice = filtered.slice(0, PAGE_SIZE);
  renderGrid(slice);

  const total = filtered.length;
  document.getElementById('resultsInfo').innerHTML = total
    ? `Showing <strong>${Math.min(PAGE_SIZE, total)}</strong> of <strong>${total}</strong> people`
    : '';
  document.getElementById('loadMoreWrap').style.display = total > PAGE_SIZE ? 'block' : 'none';
}

let searchTimeout;
function onSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(applyFilters, 220);
}

function loadMore() {
  page++;
  const start = page * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  renderGrid(slice, true);
  if (start + PAGE_SIZE >= filtered.length) {
    document.getElementById('loadMoreWrap').style.display = 'none';
  }
  const shown = Math.min((page + 1) * PAGE_SIZE, filtered.length);
  document.getElementById('resultsInfo').innerHTML = `Showing <strong>${shown}</strong> of <strong>${filtered.length}</strong> people`;
}

async function sendRequest(userId) {
  const btn = document.getElementById('btn-' + userId);
  if (!btn || btn.disabled) return;

  btn.disabled = true;
  btn.textContent = 'Sending…';

  // Check if match already exists
  const { data: existing } = await sb.from('matches')
    .select('id')
    .or(`and(user_a.eq.${currentUserId},user_b.eq.${userId}),and(user_a.eq.${userId},user_b.eq.${currentUserId})`)
    .maybeSingle();

  if (existing) {
    sentRequests.add(userId);
    btn.textContent = '✓ Request sent';
    btn.classList.add('sent');
    showToast('You already have a connection with this person!');
    return;
  }

  const { error } = await sb.from('matches').insert({
    user_a: currentUserId,
    user_b: userId,
    status: 'pending',
    created_at: new Date().toISOString()
  });

  if (error) {
    btn.disabled = false;
    btn.textContent = '🤝 Request swap';
    showToast(error.message, 'error');
  } else {
    sentRequests.add(userId);
    btn.textContent = '✓ Request sent';
    btn.classList.add('sent');
    showToast('Swap request sent! 🎉');
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = 'login.html';
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  currentUserId = session.user.id;

  // Load my profile for match scoring
  const { data: myProfile } = await sb.from('profiles').select('full_name, username, avatar_emoji, skills_wanted').eq('id', currentUserId).single();
  if (myProfile) {
    mySkillsWanted = myProfile.skills_wanted || [];
    const name = myProfile.full_name || myProfile.username || session.user.email.split('@')[0];
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('sidebarAvatar').textContent = myProfile.avatar_emoji || '👤';
  }

  // Load all profiles except self
  const { data: profiles, error } = await sb.from('profiles')
    .select('id, full_name, username, avatar_emoji, bio, location, skills_offered, skills_wanted, hours_per_week, session_format')
    .neq('id', currentUserId)
    .not('skills_offered', 'is', null)
    .order('updated_at', { ascending: false });

  if (error) { showToast(error.message, 'error'); return; }

  allProfiles = profiles || [];

  // Load already-sent requests
  const { data: sent } = await sb.from('matches').select('user_b').eq('user_a', currentUserId);
  const { data: received } = await sb.from('matches').select('user_a').eq('user_b', currentUserId);
  (sent || []).forEach(r => sentRequests.add(r.user_b));
  (received || []).forEach(r => sentRequests.add(r.user_a));

  // Build offering filter options from all skills
  const allOffered = [...new Set(allProfiles.flatMap(p => p.skills_offered || []))].sort();
  const sel = document.getElementById('filterOffering');
  allOffered.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });

  applyFilters();
}

init();
</script>
