<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SkillSwap — Discover</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--bg-card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--border-hover:rgba(139,92,246,0.3);--text-muted:rgba(255,255,255,0.32);--sidebar-w:240px;}
*{margin:0;padding:0;box-sizing:border-box;}
html{max-width:100vw;overflow-x:hidden;-webkit-text-size-adjust:100%;}
a,button,[role=button]{touch-action:manipulation;}
input,textarea,select{font-size:max(16px,1em);}
@media(max-width:900px){button,a.nav-link,.icon-btn{min-height:44px;min-width:44px;}}
body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;overflow-x:hidden;cursor:none;}
#ss-cursor{position:fixed;width:10px;height:10px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
#ss-ring{position:fixed;width:34px;height:34px;border:1px solid rgba(255,255,255,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .2s;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);height:100vh;background:rgba(255,255,255,0.015);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 14px;position:fixed;left:0;top:0;z-index:100;overflow-y:auto;}
.sidebar-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.15rem;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px;margin-bottom:32px;padding-left:8px;}
.logo-sq{width:9px;height:9px;background:#fff;border-radius:2px;flex-shrink:0;}
.nav-section{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin:18px 0 5px;padding-left:10px;}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;color:rgba(255,255,255,0.42);text-decoration:none;font-size:.875rem;transition:all .15s;margin-bottom:1px;border:1px solid transparent;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.04);}
.nav-link.active{color:#fff;background:rgba(255,255,255,0.06);border-color:var(--border);}
.nav-link svg{width:15px;height:15px;flex-shrink:0;opacity:.7;}
.nav-link.active svg,.nav-link:hover svg{opacity:1;}
.sidebar-bottom{margin-top:auto;border-top:1px solid var(--border);padding-top:14px;}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:8px;}
.user-avatar-sm{width:30px;height:30px;border-radius:50%;background:rgba(139,92,246,0.18);border:1px solid rgba(139,92,246,0.3);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;overflow:hidden;color:rgba(167,139,250,0.9);}
.user-name-sm{font-size:.82rem;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,0.65);}
.sidebar-logout-full{width:100%;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.14);border-radius:10px;color:rgba(239,68,68,0.7);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;padding:9px 12px;cursor:none;display:flex;align-items:center;gap:8px;transition:all .2s;}
.sidebar-logout-full:hover{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.28);color:#f87171;}
.sidebar-logout-full svg{width:14px;height:14px;}
.hamburger{display:flex;position:fixed;top:14px;left:14px;z-index:200;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:8px;cursor:none;color:#fff;}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);z-index:98;}
.sidebar-overlay.show{display:block;}
.sidebar{transition:transform .25s;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-track{background:transparent;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
@media(min-width:901px){body.sidebar-collapsed{--sidebar-w:0;}body.sidebar-collapsed .sidebar{transform:translateX(-100%);}}

/* MAIN */
.main{margin-left:var(--sidebar-w);flex:1;padding:40px 48px;min-height:100vh;}
.page-header{margin-bottom:28px;}
.page-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.9rem;letter-spacing:-.03em;}
.page-sub{color:var(--text-muted);font-size:.9rem;margin-top:5px;}

/* SEARCH */
.search-bar{display:flex;gap:12px;margin-bottom:22px;align-items:center;flex-wrap:wrap;}
.search-input-wrap{flex:1;min-width:240px;position:relative;}
.search-icon-abs{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.3;pointer-events:none;}
.search-icon-abs svg{width:15px;height:15px;}
.search-input{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:11px 16px 11px 40px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,background .2s;}
.search-input::placeholder{color:var(--text-muted);}
.search-input:focus{border-color:rgba(139,92,246,0.45);background:rgba(139,92,246,0.04);}
.filter-select{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:rgba(255,255,255,0.6);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;cursor:none;transition:border-color .2s;}
.filter-select:focus{border-color:rgba(139,92,246,0.45);}
.filter-select option{background:#111;}

.results-info{font-size:.82rem;color:var(--text-muted);margin-bottom:18px;}
.results-info strong{color:rgba(255,255,255,0.6);}

/* GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}

/* USER CARD */
.user-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:0;transition:border-color .25s,transform .25s;backdrop-filter:blur(12px);position:relative;animation:fadeUp .4s ease both;}
.user-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,0),transparent);transition:background .3s;}
.user-card:hover{border-color:var(--border-hover);transform:translateY(-3px);}
.user-card:hover::before{background:linear-gradient(90deg,transparent,rgba(139,92,246,0.6),transparent);}
.card-top{display:flex;align-items:center;gap:13px;margin-bottom:12px;}
.card-avatar{width:46px;height:46px;border-radius:50%;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.2);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0;overflow:hidden;color:rgba(167,139,250,0.8);}
.card-meta{}
.card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;margin-bottom:2px;}
.card-location{font-size:.75rem;color:var(--text-muted);}
.match-score{display:flex;align-items:center;gap:8px;font-size:.75rem;color:rgba(167,139,250,0.7);margin-bottom:10px;}
.score-bar{flex:1;height:3px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:hidden;}
.score-fill{height:100%;background:linear-gradient(90deg,rgba(139,92,246,.7),rgba(103,232,249,.6));border-radius:100px;}
.card-bio{font-size:.8rem;color:var(--text-muted);line-height:1.5;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.skills-section{margin-bottom:16px;}
.skill-section-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,0.2);margin-bottom:6px;margin-top:10px;}
.skill-section-label:first-child{margin-top:0;}
.skill-tags{display:flex;flex-wrap:wrap;gap:5px;}
.skill-tag{border:1px solid rgba(139,92,246,0.35);color:rgba(167,139,250,0.7);padding:3px 9px;border-radius:100px;font-size:.72rem;}
.skill-tag.want{border-color:rgba(34,211,238,0.28);color:rgba(103,232,249,0.65);}
.card-actions{margin-top:auto;display:flex;gap:8px;}
.btn-request{flex:1;background:#fff;color:#080808;border:none;border-radius:10px;padding:10px;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;cursor:none;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-request:hover{opacity:.88;}
.btn-request.sent{background:rgba(34,197,94,0.1);color:#86efac;border:1px solid rgba(34,197,94,0.2);font-weight:500;}
.btn-request:disabled{opacity:.6;cursor:default;}
.btn-request svg{width:13px;height:13px;}
.btn-view-profile{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:rgba(255,255,255,0.5);border-radius:10px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:none;transition:all .2s;text-decoration:none;display:flex;align-items:center;white-space:nowrap;}
.btn-view-profile:hover{border-color:rgba(255,255,255,0.15);color:#fff;}

/* LOAD MORE */
.load-more-wrap{text-align:center;margin-top:28px;}
.btn-load-more{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;color:rgba(255,255,255,0.5);padding:11px 24px;font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:none;transition:all .2s;}
.btn-load-more:hover{border-color:rgba(255,255,255,0.14);color:#fff;}

/* EMPTY */
.empty-state{grid-column:1/-1;text-align:center;padding:48px 24px;color:var(--text-muted);}
.empty-state h3{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:8px;color:rgba(255,255,255,.6);}
.empty-state p{font-size:.85rem;margin-bottom:18px;line-height:1.5;}
.btn-white{display:inline-flex;align-items:center;gap:7px;background:#fff;color:#080808;padding:10px 20px;border-radius:10px;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;text-decoration:none;transition:opacity .2s;}
.btn-white:hover{opacity:.88;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:12px 20px;border-radius:12px;font-size:.85rem;z-index:9000;animation:fadeUp .3s ease;backdrop-filter:blur(12px);}
.toast.error{border-color:rgba(239,68,68,0.3);color:#fca5a5;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:900px){.sidebar{transform:translateX(-100%);transition:transform .3s;background:#0e0e0e !important;border-right:1px solid rgba(255,255,255,0.1) !important;}.sidebar.open{transform:translateX(0);}.sidebar .nav-link{color:#fff;opacity:1;}.main{margin-left:0;padding:24px 20px;padding-top:56px;}.hamburger{display:flex;}}
</style>
</head>
<body>
<div id="ss-cursor"></div><div id="ss-ring"></div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>

<aside class="sidebar" id="sidebar">
  <a href="/" class="sidebar-logo"><div class="logo-sq"></div>SkillSwap</a>
  <span class="nav-section">Main</span>
  <a href="/dashboard" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
  <a href="/profile" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Profile</a>
  <a href="/discover" class="nav-link active"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>Discover</a>
  <span class="nav-section">Social</span>
  <a href="/matches" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Matches</a>
  <a href="/messages" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages</a>
  <span class="nav-section">More</span>
  <a href="/webinars" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Webinars</a>
  <a href="/pricing" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Upgrade</a>
  <div class="sidebar-bottom">
    <div class="user-pill"><div class="user-avatar-sm" id="sidebarAvatar"></div><span class="user-name-sm" id="sidebarName">Loading...</span></div>
    <button class="sidebar-logout-full" onclick="handleLogout()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</button>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <h1 class="page-title">Discover</h1>
    <p class="page-sub">Find people to swap skills with. Matches are ranked by compatibility.</p>
  </div>

  <div class="search-bar">
    <div class="search-input-wrap">
      <span class="search-icon-abs"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg></span>
      <input class="search-input" type="text" id="searchInput" placeholder="Search by name, skill, bio..." oninput="onSearch()">
    </div>
    <select class="filter-select" id="filterSkill" onchange="applyFilters()">
      <option value="">All skills</option>
    </select>
    <select class="filter-select" id="filterFormat" onchange="applyFilters()">
      <option value="">Any format</option>
      <option value="video">Video</option>
      <option value="text">Text / async</option>
      <option value="both">Both</option>
    </select>
  </div>

  <div class="results-info" id="resultsInfo"></div>
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
    <button class="btn-load-more" onclick="loadMore()">Load more</button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>

// Cursor
const cur=document.getElementById('ss-cursor'),ring=document.getElementById('ss-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
document.querySelectorAll('a,button,select,input').forEach(el=>{el.addEventListener('mouseenter',()=>{ring.style.borderColor='rgba(139,92,246,0.6)';ring.style.width='44px';ring.style.height='44px';});el.addEventListener('mouseleave',()=>{ring.style.borderColor='rgba(255,255,255,0.5)';ring.style.width='34px';ring.style.height='34px';});});
(function anim(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim);})();

function toggleSidebar(){if(window.innerWidth<=900){const s=document.getElementById('sidebar'),o=document.getElementById('sidebar-overlay');s.classList.toggle('open');o.classList.toggle('show');document.body.style.overflow=s.classList.contains('open')?'hidden':'';}else{const c=document.body.classList.toggle('sidebar-collapsed');localStorage.setItem('ss_sidebar',c?'0':'1');}}
async function handleLogout(){await sb.auth.signOut();window.location.href='/';}

function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(msg,type='success'){const t=document.createElement('div');t.className='toast'+(type==='error'?' error':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},3000);}

let currentUserId=null,mySkillsWanting=[],mySkillsOffering=[],allProfiles=[],filtered=[],sentRequests=new Set();
const PAGE_SIZE=12;let page=0;

function matchScore(p){
  const theyOffer=(p.skills_offering||p.skills_offered||[]).map(s=>s.toLowerCase());
  const iWant=mySkillsWanting.map(s=>s.toLowerCase());
  const iOffer=mySkillsOffering.map(s=>s.toLowerCase());
  const theyWant=(p.skills_wanting||p.skills_wanted||[]).map(s=>s.toLowerCase());
  let score=0;
  iWant.forEach(s=>{if(theyOffer.includes(s))score+=2;});
  iOffer.forEach(s=>{if(theyWant.includes(s))score+=1;});
  return Math.min(score/Math.max((iWant.length+iOffer.length)||1,1),1);
}

function renderCard(p,idx){
  const name=p.full_name||p.username||'Skill Swapper';
  const initials=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  const avatarHtml=p.avatar_url?`<img src="${escHtml(p.avatar_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`:(p.avatar_emoji||escHtml(initials));
  const bio=escHtml((p.bio||'').slice(0,100)||'No bio yet.');
  const offered=(p.skills_offering||p.skills_offered||[]).slice(0,4);
  const wanted=(p.skills_wanting||p.skills_wanted||[]).slice(0,3);
  const score=matchScore(p);
  const scorePct=Math.round(score*100);
  const isSent=sentRequests.has(p.id);
  const delay=(idx%PAGE_SIZE)*0.05;
  return`<div class="user-card" style="animation-delay:${delay}s">
    <div class="card-top">
      <div class="card-avatar">${avatarHtml}</div>
      <div class="card-meta">
        <div class="card-name">${escHtml(name)}</div>
        ${p.location?`<div class="card-location">${escHtml(p.location)}</div>`:''}
      </div>
    </div>
    ${scorePct>0?`<div class="match-score"><span>${scorePct}% match</span><div class="score-bar"><div class="score-fill" style="width:${scorePct}%"></div></div></div>`:''}
    <div class="card-bio">${bio}</div>
    <div class="skills-section">
      ${offered.length?`<div class="skill-section-label">Offers</div><div class="skill-tags">${offered.map(s=>`<span class="skill-tag">${escHtml(s)}</span>`).join('')}</div>`:''}
      ${wanted.length?`<div class="skill-section-label">Wants to learn</div><div class="skill-tags">${wanted.map(s=>`<span class="skill-tag want">${escHtml(s)}</span>`).join('')}</div>`:''}
    </div>
    <div class="card-actions">
      <button class="btn-request${isSent?' sent':''}" id="btn-${p.id}" onclick="sendRequest('${p.id}',this)" ${isSent?'disabled':''}>
        ${isSent?'<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Requested':'<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Send Request'}
      </button>
      <a href="/user?id=${p.id}" class="btn-view-profile">View</a>
    </div>
  </div>`;
}

function renderGrid(profiles,append=false){
  const grid=document.getElementById('cardsGrid');
  if(!append)grid.innerHTML='';
  if(!profiles.length&&!append){
    grid.innerHTML=`<div class="empty-state"><h3>No one found</h3><p>Try a different search or add more skills to your profile.</p><a href="/profile" class="btn-white">Add my skills</a></div>`;
    document.getElementById('loadMoreWrap').style.display='none';
    return;
  }
  grid.insertAdjacentHTML('beforeend',profiles.map((p,i)=>renderCard(p,i)).join(''));
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const skillF=document.getElementById('filterSkill').value.toLowerCase();
  const fmtF=document.getElementById('filterFormat').value;
  filtered=allProfiles.filter(p=>{
    const name=(p.full_name||p.username||'').toLowerCase();
    const bio=(p.bio||'').toLowerCase();
    const offered=(p.skills_offering||p.skills_offered||[]).map(s=>s.toLowerCase());
    const wanted=(p.skills_wanting||p.skills_wanted||[]).map(s=>s.toLowerCase());
    const all=[name,bio,...offered,...wanted].join(' ');
    if(q&&!all.includes(q))return false;
    if(skillF&&!offered.some(s=>s.includes(skillF)))return false;
    if(fmtF&&p.session_format&&p.session_format!==fmtF&&p.session_format!=='both')return false;
    return true;
  });
  filtered.sort((a,b)=>matchScore(b)-matchScore(a));
  page=0;
  const slice=filtered.slice(0,PAGE_SIZE);
  renderGrid(slice);
  const total=filtered.length;
  document.getElementById('resultsInfo').innerHTML=total?`Showing <strong>${Math.min(PAGE_SIZE,total)}</strong> of <strong>${total}</strong> people`:'';
  document.getElementById('loadMoreWrap').style.display=total>PAGE_SIZE?'block':'none';
}

let searchTimer;
function onSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,220);}

function loadMore(){
  page++;
  const start=page*PAGE_SIZE;
  renderGrid(filtered.slice(start,start+PAGE_SIZE),true);
  if(start+PAGE_SIZE>=filtered.length)document.getElementById('loadMoreWrap').style.display='none';
  const shown=Math.min((page+1)*PAGE_SIZE,filtered.length);
  document.getElementById('resultsInfo').innerHTML=`Showing <strong>${shown}</strong> of <strong>${filtered.length}</strong> people`;
}

async function sendRequest(userId,btn){
  if(!btn||btn.disabled)return;
  btn.disabled=true;
  btn.innerHTML='Sending...';
  // Check existing
  const{data:existing}=await sb.from('matches').select('id').or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${userId}),and(sender_id.eq.${userId},receiver_id.eq.${currentUserId})`).maybeSingle();
  if(existing){
    sentRequests.add(userId);
    btn.innerHTML='<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Requested';
    btn.classList.add('sent');
    showToast('Already connected!');
    return;
  }
  // Find skill context
  const peer=allProfiles.find(p=>p.id===userId);
  const skillOffered=(mySkillsOffering[0]||'');
  const skillWanted=(peer?.skills_offering||peer?.skills_offered||[])[0]||'';
  const{error}=await sb.from('matches').insert({sender_id:currentUserId,receiver_id:userId,status:'pending',skill_offered:skillOffered,skill_wanted:skillWanted});
  if(error){
    console.error('Send request error:',error);
    btn.disabled=false;
    btn.innerHTML='<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Send Request';
    showToast(error.message,'error');
  }else{
    sentRequests.add(userId);
    btn.innerHTML='<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Requested';
    btn.classList.add('sent');
    showToast('Swap request sent!');
  }
}

async function init(){
  if(window.innerWidth>900&&localStorage.getItem('ss_sidebar')==='0')document.body.classList.add('sidebar-collapsed');
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.replace('/login');return;}
  currentUserId=session.user.id;
  const{data:me,error:meErr}=await sb.from('profiles').select('*').eq('id',currentUserId).single();
  if(meErr)console.error('Profile error:',meErr);
  const name=me?.full_name||me?.username||session.user.email.split('@')[0];
  document.getElementById('sidebarName').textContent=name;
  const avatarEl=document.getElementById('sidebarAvatar');
  if(me?.avatar_url){avatarEl.innerHTML=`<img src="${escHtml(me.avatar_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;}
  else{avatarEl.textContent=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);}
  mySkillsOffering=me?.skills_offering||me?.skills_offered||[];
  mySkillsWanting=me?.skills_wanting||me?.skills_wanted||[];

  // Load already-sent requests
  const{data:sent}=await sb.from('matches').select('receiver_id').eq('sender_id',currentUserId);
  (sent||[]).forEach(m=>sentRequests.add(m.receiver_id));

  // Load all users except self
  const{data:profiles,error:pErr}=await sb.from('profiles').select('*').neq('id',currentUserId);
  if(pErr)console.error('Profiles error:',pErr);
  allProfiles=profiles||[];

  // Populate skill filter
  const allSkills=new Set();
  allProfiles.forEach(p=>(p.skills_offering||p.skills_offered||[]).forEach(s=>allSkills.add(s)));
  const sel=document.getElementById('filterSkill');
  [...allSkills].sort().forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});

  applyFilters();
}

init();
</script>
