<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SkillSwap — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--bg-card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--border-hover:rgba(139,92,246,0.3);--text-muted:rgba(255,255,255,0.32);--sidebar-w:240px;}
*{margin:0;padding:0;box-sizing:border-box;}
html{max-width:100vw;overflow-x:hidden;-webkit-text-size-adjust:100%;}
a,button,[role=button]{touch-action:manipulation;}
input,textarea,select{font-size:max(16px,1em);}
@media(max-width:900px){button,a.nav-link,.icon-btn{min-height:44px;min-width:44px;}}
html,body{height:100%;}
body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;display:flex;overflow:hidden;cursor:none;}
#ss-cursor{position:fixed;width:10px;height:10px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
#ss-ring{position:fixed;width:34px;height:34px;border:1px solid rgba(255,255,255,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .2s;}
.sidebar{width:var(--sidebar-w);height:100vh;background:rgba(255,255,255,0.015);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 14px;position:fixed;left:0;top:0;z-index:100;overflow-y:auto;}
.sidebar-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.15rem;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px;margin-bottom:32px;padding-left:8px;}
.logo-sq{width:9px;height:9px;background:#fff;border-radius:2px;flex-shrink:0;}
.nav-section{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin:18px 0 5px;padding-left:10px;}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;color:rgba(255,255,255,0.42);text-decoration:none;font-size:.875rem;transition:all .15s;margin-bottom:1px;border:1px solid transparent;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.04);}
.nav-link.active{color:#fff;background:rgba(255,255,255,0.06);border-color:var(--border);}
.nav-link svg{width:15px;height:15px;flex-shrink:0;opacity:.7;}
.nav-link.active svg,.nav-link:hover svg{opacity:1;}
.sidebar-bottom{margin-top:auto;border-top:1px solid var(--border);padding-top:14px;}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:8px;}
.user-avatar-sm{width:30px;height:30px;border-radius:50%;background:rgba(139,92,246,0.18);border:1px solid rgba(139,92,246,0.3);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;overflow:hidden;color:rgba(167,139,250,0.9);}
.user-name-sm{font-size:.82rem;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,0.65);}
.sidebar-logout-full{width:100%;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.14);border-radius:10px;color:rgba(239,68,68,0.7);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;padding:9px 12px;cursor:none;display:flex;align-items:center;gap:8px;transition:all .2s;}
.sidebar-logout-full:hover{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.28);color:#f87171;}
.sidebar-logout-full svg{width:14px;height:14px;}
.hamburger{display:flex;position:fixed;top:14px;left:14px;z-index:200;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:8px;cursor:none;color:#fff;}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);z-index:98;}
.sidebar-overlay.show{display:block;}
.sidebar{transition:transform .25s;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-track{background:transparent;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
/* Active call banner */
.active-call-banner{display:none;align-items:center;gap:12px;padding:10px 18px;background:rgba(34,197,94,0.08);border-bottom:1px solid rgba(34,197,94,0.2);flex-shrink:0;}
.active-call-banner.show{display:flex;}
.call-pulse{width:8px;height:8px;background:#22c55e;border-radius:50%;flex-shrink:0;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.active-call-text{flex:1;font-size:.82rem;color:rgba(255,255,255,.7);}
.active-call-text strong{color:#86efac;}
.btn-rejoin{background:#22c55e;color:#080808;border:none;border-radius:8px;padding:6px 14px;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;cursor:none;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:opacity .2s;}
.btn-rejoin:hover{opacity:.85;}
.btn-rejoin svg{width:12px;height:12px;}
.btn-dismiss-call{background:none;border:none;color:rgba(255,255,255,.3);cursor:none;padding:4px;display:flex;align-items:center;font-size:1rem;line-height:1;transition:color .15s;}
.btn-dismiss-call:hover{color:rgba(255,255,255,.6);}
@media(min-width:901px){
  body.sidebar-collapsed{--sidebar-w:0;}
  body.sidebar-collapsed .sidebar{transform:translateX(-100%);}
}

/* CHAT LAYOUT */
.chat-layout{margin-left:var(--sidebar-w);flex:1;display:flex;height:100vh;overflow:hidden;}

/* CONVOS */
.convos-panel{width:290px;min-width:290px;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;}
.convos-header{padding:22px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.convos-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:10px;}
.search-convos{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s;}
.search-convos::placeholder{color:var(--text-muted);}
.search-convos:focus{border-color:rgba(139,92,246,0.45);}
.convos-list{flex:1;overflow-y:auto;padding:6px;}
.convos-list::-webkit-scrollbar{width:3px;}
.convos-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.convo-item{display:flex;align-items:center;gap:11px;padding:11px;border-radius:12px;cursor:none;transition:background .15s;position:relative;}
.convo-item:hover{background:rgba(255,255,255,0.03);}
.convo-item.active{background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.15);}
.convo-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.2);color:rgba(167,139,250,0.8);overflow:hidden;}
.convo-info{flex:1;min-width:0;}
.convo-name{font-weight:500;font-size:.86rem;margin-bottom:2px;}
.convo-preview{font-size:.75rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.convo-time{font-size:.7rem;color:var(--text-muted);flex-shrink:0;}
.unread-dot{position:absolute;top:11px;right:11px;width:7px;height:7px;background:rgba(139,92,246,0.9);border-radius:50%;}

/* CHAT WINDOW */
.chat-panel{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.chat-header{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:13px;flex-shrink:0;}
.chat-peer-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.2);color:rgba(167,139,250,0.8);flex-shrink:0;overflow:hidden;}
.chat-peer-info{flex:1;}
.chat-peer-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;}
.chat-peer-sub{font-size:.75rem;color:var(--text-muted);}
.chat-header-actions{display:flex;gap:7px;}
.icon-btn{background:var(--bg-card);border:1px solid var(--border);color:rgba(255,255,255,0.45);width:34px;height:34px;border-radius:9px;cursor:none;transition:all .2s;display:flex;align-items:center;justify-content:center;text-decoration:none;}
.icon-btn:hover{border-color:rgba(255,255,255,0.14);color:#fff;}
.icon-btn svg{width:14px;height:14px;}

.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}
.messages-area::-webkit-scrollbar{width:3px;}
.messages-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

.msg-row{display:flex;gap:8px;max-width:70%;}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;align-self:flex-end;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.2);color:rgba(167,139,250,0.8);overflow:hidden;}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:.86rem;line-height:1.5;max-width:100%;}
.msg-row:not(.mine) .msg-bubble{background:var(--bg-card);border:1px solid var(--border);color:rgba(255,255,255,0.87);}
.msg-row.mine .msg-bubble{background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.25);color:rgba(255,255,255,0.9);}
.msg-time{font-size:.68rem;color:var(--text-muted);margin-top:4px;text-align:right;}

.date-divider{text-align:center;color:var(--text-muted);font-size:.75rem;margin:8px 0;display:flex;align-items:center;gap:10px;}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* INPUT */
.chat-input-wrap{position:relative;padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
.chat-textarea{flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;resize:none;max-height:120px;overflow-y:auto;transition:border-color .2s;}
.chat-textarea::placeholder{color:var(--text-muted);}
.chat-textarea:focus{border-color:rgba(139,92,246,0.45);}
.btn-send{background:#fff;color:#080808;border:none;border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:none;transition:opacity .2s;flex-shrink:0;}
.btn-send:hover{opacity:.85;}
.btn-send svg{width:16px;height:16px;}

/* EMOJI PICKER */
.emoji-btn{background:none;border:none;color:var(--text-muted);cursor:none;padding:6px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:color .15s;flex-shrink:0;}
.emoji-btn:hover{color:#fff;}
.emoji-btn svg{width:19px;height:19px;}
.emoji-picker{position:absolute;bottom:calc(100% + 6px);left:0;width:308px;background:#161616;border:1px solid var(--border);border-radius:14px;padding:10px;z-index:200;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.emoji-picker.open{display:block;}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:188px;overflow-y:auto;}
.emoji-grid::-webkit-scrollbar{width:3px;}
.emoji-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.emoji-grid button{background:none;border:none;font-size:1.15rem;cursor:pointer;padding:5px 4px;border-radius:6px;transition:background .12s;line-height:1;}
.emoji-grid button:hover{background:rgba(255,255,255,0.08);}
/* READ RECEIPTS */
.msg-seen{font-size:.65rem;color:rgba(139,92,246,0.65);text-align:right;margin-top:1px;}

/* NO CHAT SELECTED */
.no-chat{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text-muted);}
.no-chat svg{width:40px;height:40px;opacity:.2;}
.no-chat p{font-size:.9rem;}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
/* ── Context Menu ── */
.msg-context-menu{position:fixed;background:#181818;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:8px;z-index:2000;box-shadow:0 12px 40px rgba(0,0,0,0.8);min-width:172px;}
.ctx-react-row{display:flex;gap:2px;padding:4px 6px 8px;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:4px;}
.ctx-react-btn{background:none;border:none;font-size:1.25rem;cursor:none;padding:5px 7px;border-radius:8px;transition:background .12s;line-height:1;}
.ctx-react-btn:hover{background:rgba(255,255,255,0.09);}
.ctx-react-btn.reacted{background:rgba(139,92,246,0.18);outline:1px solid rgba(139,92,246,0.38);}
.ctx-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:rgba(255,255,255,0.82);font-size:.84rem;cursor:none;transition:background .12s;user-select:none;}
.ctx-item:hover{background:rgba(255,255,255,0.05);}
.ctx-item svg{width:14px;height:14px;flex-shrink:0;}
.ctx-item.danger{color:rgba(239,68,68,0.85);}
.ctx-item.danger:hover{background:rgba(239,68,68,0.07);}
.ctx-del-confirm{padding:8px 12px;}
.ctx-del-label{font-size:.82rem;color:rgba(255,255,255,.6);margin-bottom:8px;}
.ctx-del-btns{display:flex;gap:6px;}
.ctx-del-btn{flex:1;padding:7px;border-radius:8px;font-size:.78rem;font-weight:500;cursor:none;border:none;}
.ctx-del-yes{background:rgba(239,68,68,0.14);color:#f87171;border:1px solid rgba(239,68,68,0.22) !important;}
.ctx-del-no{background:rgba(255,255,255,0.07);color:rgba(255,255,255,.6);}
/* ── Reactions ── */
.msg-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.rxn-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:2px 9px 2px 6px;font-size:.82rem;cursor:none;transition:all .15s;line-height:1.35;user-select:none;}
.rxn-pill:hover{background:rgba(255,255,255,0.09);}
.rxn-pill.mine{background:rgba(139,92,246,0.12);border-color:rgba(139,92,246,0.3);}
.rxn-count{font-size:.7rem;color:rgba(255,255,255,0.5);font-family:'DM Sans',sans-serif;}
/* ── Inline Edit ── */
.edit-wrap{display:flex;flex-direction:column;gap:6px;min-width:180px;}
.edit-ta{background:rgba(255,255,255,0.05);border:1px solid rgba(139,92,246,0.45);border-radius:10px;padding:10px 12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.86rem;line-height:1.5;resize:none;width:100%;outline:none;overflow-y:hidden;cursor:text;}
.edit-actions{display:flex;gap:6px;}
.edit-save{background:#fff;color:#080808;border:none;border-radius:8px;padding:5px 14px;font-size:.78rem;font-weight:600;cursor:none;}
.edit-cancel-btn{background:rgba(255,255,255,0.07);border:none;color:rgba(255,255,255,.55);border-radius:8px;padding:5px 12px;font-size:.78rem;cursor:none;}
.edited-tag{font-size:.63rem;color:var(--text-muted);margin-left:4px;font-style:italic;}
.msg-bubble{transition:opacity .12s,transform .12s;}
.msg-row.pressing .msg-bubble{opacity:.68;transform:scale(.975);}
@media(max-width:900px){.sidebar{transform:translateX(-100%);transition:transform .3s;background:#0e0e0e !important;border-right:1px solid rgba(255,255,255,0.1) !important;}.sidebar.open{transform:translateX(0);}.sidebar .nav-link{color:#fff;opacity:1;}.chat-layout{margin-left:0;}.hamburger{display:flex;}}
@media(max-width:660px){
  .convos-panel{width:100%;position:absolute;left:0;top:0;bottom:0;z-index:50;background:var(--bg);}
  .convos-panel.hidden{display:none;}
  /* Use dynamic viewport height so iOS address-bar doesn't clip the input */
  .chat-panel{width:100%;height:-webkit-fill-available;height:100dvh;}
  .btn-back-mobile{display:flex !important;}
  /* No !important — JS can override with style.display='none' when chat is open */
  .compose-fab{display:flex;}
  .chat-textarea{font-size:16px !important;}
  /* Sticky input bar so it stays above iOS home-bar / browser chrome */
  .chat-input-wrap{position:sticky;bottom:0;z-index:5;background:var(--bg);
    padding-bottom:max(14px,env(safe-area-inset-bottom));}
}
.convos-header-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.compose-btn{background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.25);color:rgba(167,139,250,0.8);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:none;text-decoration:none;flex-shrink:0;transition:background .15s;}
.compose-btn:hover{background:rgba(139,92,246,0.22);}
.compose-btn svg{width:15px;height:15px;}
.btn-back-mobile{display:none;background:none;border:none;color:rgba(255,255,255,0.55);cursor:none;padding:0;min-width:44px;min-height:44px;align-items:center;justify-content:center;flex-shrink:0;}
.btn-back-mobile svg{width:18px;height:18px;}
.compose-fab{display:none;position:fixed;bottom:24px;right:20px;z-index:70;width:52px;height:52px;border-radius:50%;background:#fff;color:#080808;border:none;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,0.6);cursor:none;text-decoration:none;transition:opacity .2s;}
.compose-fab:hover{opacity:.85;}
.compose-fab svg{width:20px;height:20px;}
</style>
</head>
<body>
<div id="ss-cursor"></div><div id="ss-ring"></div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<button class="hamburger" id="hamburger" onclick="toggleSidebar()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>

<aside class="sidebar" id="sidebar">
  <a href="/" class="sidebar-logo"><div class="logo-sq"></div>SkillSwap</a>
  <span class="nav-section">Main</span>
  <a href="/dashboard" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
  <a href="/profile" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>My Profile</a>
  <a href="/discover" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>Discover</a>
  <span class="nav-section">Social</span>
  <a href="/matches" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Matches</a>
  <a href="/messages" class="nav-link active"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages</a>
  <span class="nav-section">More</span>
  <a href="/webinars" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Webinars</a>
  <a href="/pricing" class="nav-link"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Upgrade</a>
  <div class="sidebar-bottom">
    <div class="user-pill"><div class="user-avatar-sm" id="sidebarAvatar"></div><span class="user-name-sm" id="sidebarName">Loading...</span></div>
    <button class="sidebar-logout-full" onclick="handleLogout()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</button>
  </div>
</aside>

<div class="chat-layout">
  <!-- CONVOS LIST -->
  <div class="convos-panel" id="convosPanel">
    <div class="convos-header">
      <div class="convos-header-row"><div class="convos-title" style="flex:1;">Messages</div><a href="/matches" class="compose-btn" title="Start new conversation"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></a></div>
      <input class="search-convos" type="text" placeholder="Search conversations..." id="searchConvos" oninput="filterConvos()">
    </div>
    <div class="convos-list" id="convosList">
      <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:.85rem;">Loading...</div>
    </div>
  </div>

  <!-- CHAT WINDOW -->
  <div class="chat-panel" id="chatPanel">
    <div class="no-chat" id="noChatState">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Select a conversation to start messaging</p>
    </div>
    <div id="chatActive" style="display:none;flex-direction:column;height:100%;">
      <div class="chat-header">
        <button class="btn-back-mobile" onclick="backToConvosList()" title="Back"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="chat-peer-avatar" id="chatPeerAvatar"></div>
        <div class="chat-peer-info">
          <div class="chat-peer-name" id="chatPeerName"></div>
          <div class="chat-peer-sub" id="chatPeerSub"></div>
        </div>
        <div class="chat-header-actions">
          <button class="icon-btn" id="voiceCallBtn" title="Start voice call" onclick="startCallFromMessages('voice')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.45 2 2 0 0 1 3.58 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></button>
          <button class="icon-btn" id="callBtn" title="Start video call" onclick="startCallFromMessages('video')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></button>
        </div>
      </div>
      <!-- Active call banner — shown when a call is alive in localStorage for this match -->
      <div class="active-call-banner" id="activeCallBanner">
        <div class="call-pulse"></div>
        <div class="active-call-text">Call with <strong id="activeCallPeer">partner</strong> is ongoing</div>
        <a id="activeCallRejoinBtn" href="#" class="btn-rejoin"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>Rejoin</a>
        <button class="btn-dismiss-call" onclick="dismissCallBanner()" title="Dismiss">✕</button>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="chat-input-wrap">
        <div id="emojiPicker" class="emoji-picker"></div>
        <button class="emoji-btn" id="emojiToggle" onclick="toggleEmojiPicker(event)" title="Emoji"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9" stroke-linecap="round" stroke-width="3"/><line x1="15" y1="9" x2="15.01" y2="9" stroke-linecap="round" stroke-width="3"/></svg></button>
        <textarea class="chat-textarea" id="msgInput" placeholder="Type a message..." rows="1" onkeydown="onMsgKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="input-validation.js"></script>
<script>

const cur=document.getElementById('ss-cursor'),ring=document.getElementById('ss-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>{ring.style.borderColor='rgba(139,92,246,0.6)';ring.style.width='44px';ring.style.height='44px';});el.addEventListener('mouseleave',()=>{ring.style.borderColor='rgba(255,255,255,0.5)';ring.style.width='34px';ring.style.height='34px';});});
(function anim(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim);})();
function toggleSidebar(){
  if(window.innerWidth<=900){
    const s=document.getElementById('sidebar'),o=document.getElementById('sidebar-overlay');
    s.classList.toggle('open');o.classList.toggle('show');
    document.body.style.overflow=s.classList.contains('open')?'hidden':'';
  } else {
    const c=document.body.classList.toggle('sidebar-collapsed');
    localStorage.setItem('ss_sidebar',c?'0':'1');
  }
}
async function handleLogout(){await sb.auth.signOut();window.location.href='/';}

// ── Active call banner ──
const ACTIVE_CALL_KEY='ss_active_call';
function getActiveCallForMatch(matchId){
  try{
    const d=JSON.parse(localStorage.getItem(ACTIVE_CALL_KEY)||'null');
    if(!d)return null;
    if(Date.now()-d.timestamp>4*60*60*1000){localStorage.removeItem(ACTIVE_CALL_KEY);return null;}
    if(d.matchId===matchId)return d;
    return null;
  }catch{return null;}
}
function showActiveCallBanner(call,peerName){
  const banner=document.getElementById('activeCallBanner');
  document.getElementById('activeCallPeer').textContent=peerName||call.peerName||'partner';
  const voiceParam=call.voice?'&voice=1':'';
  const callerParam=call.isCaller?'&caller=1':'';
  document.getElementById('activeCallRejoinBtn').href=`/videocall?room=${encodeURIComponent(call.roomId)}&match=${call.matchId||''}${callerParam}${voiceParam}`;
  banner.classList.add('show');
}
function hideActiveCallBanner(){document.getElementById('activeCallBanner').classList.remove('show');}
function dismissCallBanner(){
  localStorage.removeItem(ACTIVE_CALL_KEY);
  hideActiveCallBanner();
}

function genRoomId(){return Math.random().toString(36).slice(2,9)+Math.random().toString(36).slice(2,9);}
let currentUserId=null,currentMatchId=null,conversations=[],realtimeSub=null,pollInterval=null;
// Cache of call invite statuses — populated before render so bubbleContent() is synchronous
let cachedCallStatuses={}; // roomId → {status, created_at}

function avatarHtml(p){
  if(p?.avatar_url)return`<img src="${escHtml(p.avatar_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  const n=p?.full_name||p?.username||'?';
  return n.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
}

function timeAgo(d){
  const diff=(Date.now()-new Date(d).getTime())/1000;
  if(diff<60)return'now';
  if(diff<3600)return Math.floor(diff/60)+'m';
  if(diff<86400)return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'d';
}

function filterConvos(){
  const q=document.getElementById('searchConvos').value.toLowerCase();
  renderConvosList(conversations.filter(c=>{
    const peer=c.sender_id===currentUserId?c.receiver:c.sender;
    return(peer?.full_name||'').toLowerCase().includes(q)||(peer?.username||'').toLowerCase().includes(q);
  }));
}

function renderConvosList(convos){
  const list=document.getElementById('convosList');
  if(!convos.length){
    list.innerHTML=`<div style="padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;"><svg width="32" height="32" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span style="color:var(--text-muted);font-size:.85rem;">No conversations yet.</span><a href="/matches" style="background:#fff;color:#080808;padding:8px 18px;border-radius:9px;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:6px;"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Find Matches</a></div>`;
    return;
  }
  list.innerHTML=convos.map(c=>{
    const peer=c.sender_id===currentUserId?c.receiver:c.sender;
    const av=avatarHtml(peer);
    const name=peer?.full_name||peer?.username||'Skill Swapper';
    const lastMsg=c.last_msg||'';
    const rawPreview=lastMsg.startsWith('CALL_INVITE::')
      ? '📹 Video call'
      : lastMsg.startsWith('VOICE_INVITE::')
        ? '📞 Voice call'
        : lastMsg.slice(0,36)+(lastMsg.length>36?'...':'') || 'No messages yet';
    const preview=escHtml(rawPreview);
    const t=c.last_ts?timeAgo(c.last_ts):'';
    const isActive=c.id===currentMatchId;
    return`<div class="convo-item${isActive?' active':''}" onclick="openConvo('${c.id}')">
      <div class="convo-avatar">${av}</div>
      <div class="convo-info"><div class="convo-name">${escHtml(name)}</div><div class="convo-preview">${preview}</div></div>
      <span class="convo-time">${t}</span>
    </div>`;
  }).join('');
}

async function openConvo(matchId){
  currentMatchId=matchId;
  cachedCallStatuses={}; // clear cache when switching conversations
  const match=conversations.find(c=>c.id===matchId);
  if(!match)return;
  const peer=match.sender_id===currentUserId?match.receiver:match.sender;
  const name=peer?.full_name||peer?.username||'Skill Swapper';
  document.getElementById('chatPeerAvatar').innerHTML=avatarHtml(peer);
  document.getElementById('chatPeerName').textContent=name;
  document.getElementById('chatPeerSub').textContent=`${match.skill_offered||'?'} ↔ ${match.skill_wanted||'?'}`;
  document.getElementById('noChatState').style.display='none';
  const chatActive=document.getElementById('chatActive');
  chatActive.style.display='flex';
  // Check for active call for this match — verify against DB before showing banner
  const activeCall=getActiveCallForMatch(matchId);
  if(activeCall){
    const{data:inv}=await sb.from('call_invites').select('status').eq('room_id',activeCall.roomId)
      .order('created_at',{ascending:false}).limit(1).maybeSingle();
    if(inv&&['ended','declined','cancelled','expired'].includes(inv.status)){
      localStorage.removeItem(ACTIVE_CALL_KEY);hideActiveCallBanner();
    } else {showActiveCallBanner(activeCall,name);}
  } else hideActiveCallBanner();
  renderConvosList(conversations);
  await loadMessages(matchId);
  subscribeToMessages(matchId);
  startPolling(matchId);
  await sb.from('messages').update({read:true}).eq('match_id',matchId).neq('sender_id',currentUserId).then(({error})=>{if(error)console.error('Mark read error:',error);});
  // On mobile, slide convos list away to show chat and hide the new-chat FAB
  if(window.innerWidth<=660){
    document.getElementById('convosPanel').classList.add('hidden');
    const fab=document.getElementById('composeFab');
    if(fab) fab.style.display='none';
  }
}

async function loadMessages(matchId){
  const{data,error}=await sb.from('messages')
    .select('*,sender:profiles!messages_sender_id_fkey(full_name,avatar_url)')
    .eq('match_id',matchId)
    .order('created_at',{ascending:true});
  if(error){console.error('Load messages error:',error);return;}
  const msgs=data||[];
  await fetchCallStatuses(msgs);
  await fetchReactions(msgs.map(m=>m.id));
  renderMessages(msgs);
}

// Fetch call invite statuses for all call-invite messages and populate the cache.
// Must be called BEFORE renderMessages() so bubbleContent() renders the correct state
// synchronously — no DOM patching, no flicker.
async function fetchCallStatuses(msgs){
  const roomIds=msgs
    .filter(m=>m.content&&(m.content.startsWith('CALL_INVITE::')||m.content.startsWith('VOICE_INVITE::')))
    .map(m=>m.content.replace(/^(CALL_INVITE::|VOICE_INVITE::)/,''));
  if(!roomIds.length)return;
  const{data}=await sb.from('call_invites')
    .select('room_id,status,created_at')
    .in('room_id',roomIds)
    .order('created_at',{ascending:false});
  if(!data)return;
  // Keep the most recent entry per roomId
  data.forEach(inv=>{
    if(!cachedCallStatuses[inv.room_id]||
       new Date(inv.created_at)>new Date((cachedCallStatuses[inv.room_id]||{}).created_at||0)){
      cachedCallStatuses[inv.room_id]={status:inv.status,created_at:inv.created_at};
    }
  });
}

function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// Synchronous — uses cachedCallStatuses populated before render
function bubbleContent(content,isMine,matchId){
  if(content&&(content.startsWith('CALL_INVITE::')||content.startsWith('VOICE_INVITE::'))) {
    const isVoice=content.startsWith('VOICE_INVITE::');
    const roomId=content.replace(isVoice?'VOICE_INVITE::':'CALL_INVITE::','');
    const label=isMine?(isVoice?'You started a voice call':'You started a video call'):(isVoice?'Incoming voice call':'Video call invite');
    const roleParam=isMine?'&caller=1':'';
    const matchParam=matchId?'&match='+matchId:'';
    const voiceParam=isVoice?'&voice=1':'';
    const href=`/videocall?room=${encodeURIComponent(roomId)}${matchParam}${roleParam}${voiceParam}`;
    const icon=isVoice
      ?`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.45 2 2 0 0 1 3.58 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.06 6.06l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`
      :`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`;

    // Check cached status — render final state immediately, no async patching
    const cached=cachedCallStatuses[roomId];
    const status=cached?.status;
    const ENDED=['ended','declined','cancelled','expired'];
    if(status&&ENDED.includes(status)){
      let endedTxt='Call ended';
      if(status==='declined')endedTxt='Call declined';
      else if(status==='cancelled')endedTxt='Call cancelled';
      else if(status==='expired')endedTxt='No answer';
      return`<div style="display:flex;flex-direction:column;gap:6px;">
        <span style="font-size:.8rem;opacity:.5;">${label}</span>
        <span style="font-size:.78rem;color:rgba(255,255,255,.32);">${isVoice?'📞':'📹'} ${endedTxt}</span>
      </div>`;
    }
    if(status==='pending'||status==='accepted'){
      const ageH=cached?.created_at?(Date.now()-new Date(cached.created_at).getTime())/3600000:0;
      if(ageH>4){
        return`<div style="display:flex;flex-direction:column;gap:6px;">
          <span style="font-size:.8rem;opacity:.5;">${label}</span>
          <span style="font-size:.78rem;color:rgba(255,255,255,.32);">${isVoice?'📞':'📹'} Call expired</span>
        </div>`;
      }
    }
    // Active / no status yet — show join button
    return`<div style="display:flex;flex-direction:column;gap:8px;">
      <span style="font-size:.8rem;opacity:.7;">${label}</span>
      <a href="${href}" style="display:inline-flex;align-items:center;gap:6px;background:#fff;color:#080808;padding:8px 14px;border-radius:9px;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;text-decoration:none;width:fit-content;">
        ${icon}${isVoice?'Join Voice Call':'Join Call'}
      </a>
    </div>`;
  }
  return escHtml(content);
}

function renderMessages(msgs){
  if(isEditing)return;
  const area=document.getElementById('messagesArea');
  if(!msgs.length){
    area.innerHTML=`<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:.85rem;">No messages yet. Say hello!</div>`;
    return;
  }
  // Rebuild content + edited caches
  msgContentCache={};editedMsgs=new Set();
  msgs.forEach(msg=>{
    if(!isCallMsg(msg.content))msgContentCache[msg.id]=msg.content;
    if(msg.edited_at)editedMsgs.add(msg.id);
  });
  let lastReadMineIdx=-1;
  msgs.forEach((msg,i)=>{if(msg.sender_id===currentUserId&&msg.read)lastReadMineIdx=i;});
  let html='';let lastDate='';
  msgs.forEach((msg,idx)=>{
    const d=new Date(msg.created_at).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    if(d!==lastDate){html+=`<div class="date-divider">${d}</div>`;lastDate=d;}
    const isMine=msg.sender_id===currentUserId;
    const av=avatarHtml(msg.sender);
    const t=new Date(msg.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const seenHtml=(isMine&&idx===lastReadMineIdx)?'<div class="msg-seen">Seen</div>':'';
    const isCall=isCallMsg(msg.content);
    const editedHtml=msg.edited_at?'<span class="edited-tag">(edited)</span>':'';
    html+=`<div class="msg-row${isMine?' mine':''}" data-msg-id="${msg.id}" data-sender-id="${msg.sender_id}" data-created-at="${msg.created_at}" data-is-call="${isCall?'true':'false'}">
      <div class="msg-av">${av}</div>
      <div>
        <div class="msg-bubble">${bubbleContent(msg.content,isMine,currentMatchId)}${editedHtml}</div>
        <div class="msg-time">${t}</div>${seenHtml}
        ${reactionPillsHtml(msg.id)}
      </div>
    </div>`;
  });
  area.innerHTML=html;
  area.scrollTop=area.scrollHeight;
  addMessageListeners();
}

function appendMessage(msg){
  const area=document.getElementById('messagesArea');
  const isMine=msg.sender_id===currentUserId;
  const av=msg.sender?avatarHtml(msg.sender):(isMine?'Me':'?');
  const t=new Date(msg.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const isCall=isCallMsg(msg.content);
  if(!isCall)msgContentCache[msg.id]=msg.content;
  const div=document.createElement('div');
  div.className=`msg-row${isMine?' mine':''}`;
  div.style.animation='fadeUp .25s ease';
  div.dataset.msgId=msg.id;
  div.dataset.senderId=msg.sender_id;
  div.dataset.createdAt=msg.created_at;
  div.dataset.isCall=isCall?'true':'false';
  div.innerHTML=`<div class="msg-av">${av}</div><div><div class="msg-bubble">${bubbleContent(msg.content,isMine,currentMatchId)}</div><div class="msg-time">${t}</div>${reactionPillsHtml(msg.id)}</div>`;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
  addMessageListeners();
}

function subscribeToMessages(matchId){
  if(realtimeSub){sb.removeChannel(realtimeSub);}
  realtimeSub=sb.channel('messages-'+matchId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`match_id=eq.${matchId}`},async payload=>{
      if(payload.new.match_id!==currentMatchId)return;
      const{data:sender,error:sErr}=await sb.from('profiles').select('full_name,avatar_url').eq('id',payload.new.sender_id).single();
      if(sErr)console.error('Fetch sender error:',sErr);
      appendMessage({...payload.new,sender});
      if(payload.new.sender_id!==currentUserId){
        const{error}=await sb.from('messages').update({read:true}).eq('id',payload.new.id);
        if(error)console.error('Mark read error:',error);
      }
    })
    .subscribe((status)=>{
    });
}

// 3-second polling fallback in case realtime isn't enabled
function startPolling(matchId){
  if(pollInterval)clearInterval(pollInterval);
  pollInterval=setInterval(async()=>{
    if(currentMatchId===matchId)await loadMessages(matchId);
  },3000);
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,.95);border:1px solid rgba(255,255,255,.12);color:#fff;padding:10px 18px;border-radius:10px;font-size:.82rem;z-index:9999;pointer-events:none;transition:opacity .3s;max-width:280px;text-align:center;';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},3000);
}

async function sendMessage(){
  const input=document.getElementById('msgInput');
  const content=input.value.trim();
  if(!content||!currentMatchId)return;
  if(!InputValidator.text(content,5000))return;
  const sendBtn=document.getElementById('sendBtn');
  if(sendBtn){sendBtn.disabled=true;sendBtn.style.opacity='.5';}
  input.value='';input.style.height='auto';
  const{error}=await sb.from('messages').insert({match_id:currentMatchId,sender_id:currentUserId,content});
  if(sendBtn){sendBtn.disabled=false;sendBtn.style.opacity='';}
  if(error){showToast('Failed to send message. Try again.');return;}
  // Re-fetch immediately as fallback (realtime may be delayed)
  await loadMessages(currentMatchId);
}

function backToConvosList(){
  document.getElementById('convosPanel').classList.remove('hidden');
  // Restore the FAB now that we're back on the convos list
  const fab=document.getElementById('composeFab');
  if(fab) fab.style.display='';
}

// Insert a call_invite row — receiver's call-notify.js picks it up via postgres_changes
async function broadcastCallInvite(peerId,payload){
  const{roomId,matchId,callerName,callerAvatar}=payload;
  const{error}=await sb.from('call_invites').insert({
    room_id:roomId,
    match_id:matchId||null,
    caller_id:currentUserId,
    callee_id:peerId,
    caller_name:callerName,
    caller_avatar:callerAvatar,
    status:'pending'
  });
  if(error) console.error('call_invite insert error:',error);
}

async function startCallFromMessages(type='video'){
  if(!currentMatchId)return;
  const voiceBtn=document.getElementById('voiceCallBtn');
  const videoBtn=document.getElementById('callBtn');
  if(voiceBtn){voiceBtn.disabled=true;voiceBtn.style.opacity='.5';}
  if(videoBtn){videoBtn.disabled=true;videoBtn.style.opacity='.5';}
  // Encode call type in room id prefix so call-notify.js and callee side can detect it
  const baseId=genRoomId();
  const roomId=type==='voice'?'VOICE_'+baseId:baseId;
  const match=conversations.find(c=>c.id===currentMatchId);
  const peerId=match?(match.sender_id===currentUserId?match.receiver_id:match.sender_id):null;
  const msgContent=type==='voice'?'VOICE_INVITE::'+roomId:'CALL_INVITE::'+roomId;
  const{error}=await sb.from('messages').insert({match_id:currentMatchId,sender_id:currentUserId,content:msgContent});
  if(error){
    showToast('Could not start call. Try again.');
    if(voiceBtn){voiceBtn.disabled=false;voiceBtn.style.opacity='';}
    if(videoBtn){videoBtn.disabled=false;videoBtn.style.opacity='';}
    return;
  }
  if(peerId){
    const{data:me}=await sb.from('profiles').select('full_name,avatar_url').eq('id',currentUserId).single();
    await broadcastCallInvite(peerId,{roomId,matchId:currentMatchId,callerName:me?.full_name||'Someone',callerAvatar:me?.avatar_url||null});
  }
  const voiceParam=type==='voice'?'&voice=1':'';
  window.location.href='/videocall?room='+encodeURIComponent(roomId)+'&match='+currentMatchId+'&caller=1'+voiceParam;
}

function onMsgKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// ── Emoji Picker ──
const EMOJIS=['😀','😁','😂','🤣','😊','😍','🥰','😘','😎','🤔','😅','😭','😤','😡','🤩','🥳','😴','🤗','😏','🙄','😬','🤯','🥺','😢','😷','🫠','😶','🤫','🤭','😌','🥹','🫡','👍','👎','👋','🙌','🤝','💪','🫂','👏','🙏','💅','🤌','❤️','🧡','💛','💚','💙','💜','🖤','💔','💕','💯','🔥','✨','⭐','🎉','🎊','🎁','💡','🌈','🚀','🎯','💀','👻','🌟','💫','🍕','🍔','☕','🎵','🎶','📚','💻','🎮'];

function buildEmojiPicker(){
  const picker=document.getElementById('emojiPicker');
  if(picker.querySelector('.emoji-grid'))return;
  const grid=document.createElement('div');
  grid.className='emoji-grid';
  EMOJIS.forEach(em=>{
    const btn=document.createElement('button');
    btn.textContent=em;
    btn.title=em;
    btn.onclick=(e)=>{e.stopPropagation();insertEmoji(em);};
    grid.appendChild(btn);
  });
  picker.appendChild(grid);
}

function toggleEmojiPicker(e){
  e.stopPropagation();
  document.getElementById('emojiPicker').classList.toggle('open');
}

function insertEmoji(em){
  const input=document.getElementById('msgInput');
  const s=input.selectionStart,end=input.selectionEnd;
  input.value=input.value.slice(0,s)+em+input.value.slice(end);
  input.selectionStart=input.selectionEnd=s+em.length;
  input.focus();
  autoResize(input);
}

document.addEventListener('click',()=>{
  document.getElementById('emojiPicker')?.classList.remove('open');
});

// ── Context menu / edit / delete / reactions ──
const QUICK_REACTIONS=['❤️','😂','😮','😢','😡','👍'];
let cachedReactions={}; // msgId → [{message_id,user_id,emoji}]
let msgContentCache={}; // msgId → raw text (non-call messages only)
let editedMsgs=new Set(); // msgIds edited this session
let isEditing=false; // blocks poll re-render while user is editing
let ctxMsgId=null,ctxMsgEl=null;

function isCallMsg(c){return!!(c&&(c.startsWith('CALL_INVITE::')||c.startsWith('VOICE_INVITE::')));}

async function fetchReactions(msgIds){
  if(!msgIds||!msgIds.length)return;
  const{data}=await sb.from('message_reactions')
    .select('message_id,user_id,emoji')
    .in('message_id',msgIds);
  cachedReactions={};
  (data||[]).forEach(r=>{
    if(!cachedReactions[r.message_id])cachedReactions[r.message_id]=[];
    cachedReactions[r.message_id].push(r);
  });
}

function reactionPillsHtml(msgId){
  const rxns=cachedReactions[msgId]||[];
  if(!rxns.length)return`<div class="msg-reactions" data-rxn-for="${msgId}"></div>`;
  const groups={};
  rxns.forEach(r=>{if(!groups[r.emoji])groups[r.emoji]=[];groups[r.emoji].push(r.user_id);});
  const pills=Object.entries(groups).map(([em,users])=>{
    const mine=users.includes(currentUserId)?'mine':'';
    const count=users.length>1?`<span class="rxn-count">${users.length}</span>`:'';
    return`<span class="rxn-pill ${mine}" onclick="toggleReaction('${msgId}','${em}')">${em}${count}</span>`;
  }).join('');
  return`<div class="msg-reactions" data-rxn-for="${msgId}">${pills}</div>`;
}

function addMessageListeners(){
  document.querySelectorAll('.msg-row[data-msg-id]').forEach(row=>{
    if(row.dataset.lpInit)return;
    row.dataset.lpInit='1';
    let lpTimer=null,lpX=0,lpY=0;
    const start=e=>{
      if(e.target.closest('a,button,.rxn-pill,.edit-ta,.edit-save,.edit-cancel-btn'))return;
      lpX=e.clientX||(e.touches&&e.touches[0]?e.touches[0].clientX:0);
      lpY=e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:0);
      row.classList.add('pressing');
      lpTimer=setTimeout(()=>{
        lpTimer=null;
        row.classList.remove('pressing');
        showMsgContextMenu(row,lpX,lpY);
      },500);
    };
    const move=e=>{
      if(!lpTimer)return;
      const x=e.clientX||(e.touches&&e.touches[0]?e.touches[0].clientX:0);
      const y=e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:0);
      if(Math.hypot(x-lpX,y-lpY)>10){row.classList.remove('pressing');clearTimeout(lpTimer);lpTimer=null;}
    };
    const end=()=>{row.classList.remove('pressing');if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}};
    row.addEventListener('pointerdown',start);
    row.addEventListener('pointermove',move);
    row.addEventListener('pointerup',end);
    row.addEventListener('pointercancel',end);
    row.addEventListener('contextmenu',e=>{e.preventDefault();showMsgContextMenu(row,e.clientX,e.clientY);});
  });
}

function showMsgContextMenu(row,x,y){
  ctxMsgId=row.dataset.msgId;
  ctxMsgEl=row;
  const isMine=row.classList.contains('mine');
  const isCall=row.dataset.isCall==='true';
  const ageMs=Date.now()-new Date(row.dataset.createdAt).getTime();
  const canEdit=isMine&&!isCall&&ageMs<15*60*1000;

  const myRxns=new Set((cachedReactions[ctxMsgId]||[]).filter(r=>r.user_id===currentUserId).map(r=>r.emoji));
  document.getElementById('ctxReactRow').innerHTML=QUICK_REACTIONS.map(em=>
    `<button class="ctx-react-btn${myRxns.has(em)?' reacted':''}" onclick="toggleReaction('${ctxMsgId}','${em}');closeMsgContextMenu();">${em}</button>`
  ).join('');

  const editItem=document.getElementById('ctxEditItem');
  const delItem=document.getElementById('ctxDeleteItem');
  document.getElementById('ctxDeleteConfirm').style.display='none';
  delItem.style.display='flex';

  if(isMine&&!isCall){
    editItem.style.display='flex';
    editItem.style.opacity=canEdit?'1':'0.35';
    editItem.style.pointerEvents=canEdit?'':'none';
    editItem.title=canEdit?'':'Can only edit within 15 minutes of sending';
  }else{
    editItem.style.display='none';
  }
  delItem.style.display=isMine?'flex':'none';

  const menu=document.getElementById('msgContextMenu');
  menu.style.display='block';
  requestAnimationFrame(()=>{
    const mw=menu.offsetWidth,mh=menu.offsetHeight;
    let left=x+8,top=y+8;
    if(left+mw>window.innerWidth-8)left=x-mw-8;
    if(top+mh>window.innerHeight-8)top=y-mh-8;
    menu.style.left=Math.max(8,left)+'px';
    menu.style.top=Math.max(8,top)+'px';
  });
}

function closeMsgContextMenu(){
  const m=document.getElementById('msgContextMenu');
  if(m)m.style.display='none';
  ctxMsgId=null;ctxMsgEl=null;
}

// Close menu when clicking outside
document.addEventListener('pointerdown',e=>{
  if(!e.target.closest('#msgContextMenu'))closeMsgContextMenu();
},{capture:true});

function ctxEditMsg(){
  if(!ctxMsgId||!ctxMsgEl)return;
  const msgId=ctxMsgId,row=ctxMsgEl;
  closeMsgContextMenu();
  const bubble=row.querySelector('.msg-bubble');
  if(!bubble)return;
  const raw=msgContentCache[msgId]||'';
  isEditing=true;
  bubble.innerHTML=`<div class="edit-wrap">
    <textarea class="edit-ta" rows="2">${escHtml(raw)}</textarea>
    <div class="edit-actions">
      <button class="edit-save" onclick="saveEdit('${msgId}',this)">Save</button>
      <button class="edit-cancel-btn" onclick="cancelEdit('${msgId}')">Cancel</button>
    </div>
  </div>`;
  const ta=bubble.querySelector('textarea');
  ta.style.height=ta.scrollHeight+'px';
  ta.focus();ta.selectionStart=ta.selectionEnd=ta.value.length;
  ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
  ta.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))saveEdit(msgId,bubble.querySelector('.edit-save'));
    if(e.key==='Escape')cancelEdit(msgId);
  });
}

function cancelEdit(msgId){
  isEditing=false;
  const row=document.querySelector(`.msg-row[data-msg-id="${msgId}"]`);
  if(!row)return;
  const bubble=row.querySelector('.msg-bubble');
  const raw=msgContentCache[msgId]||'';
  const isMine=row.classList.contains('mine');
  bubble.innerHTML=bubbleContent(raw,isMine,currentMatchId)+(editedMsgs.has(msgId)?'<span class="edited-tag">(edited)</span>':'');
}

async function saveEdit(msgId,btn){
  const row=document.querySelector(`.msg-row[data-msg-id="${msgId}"]`);
  if(!row)return;
  const bubble=row.querySelector('.msg-bubble');
  const ta=bubble&&bubble.querySelector('textarea');
  if(!ta)return;
  const newContent=ta.value.trim();
  if(!newContent){showToast('Message cannot be empty.');return;}
  if(!InputValidator.text(newContent,5000)){showToast('Message too long (max 5000 chars).');return;}
  if(btn){btn.disabled=true;btn.style.opacity='.5';}
  const{error}=await sb.from('messages')
    .update({content:newContent,edited_at:new Date().toISOString()})
    .eq('id',msgId).eq('sender_id',currentUserId);
  if(btn){btn.disabled=false;btn.style.opacity='';}
  if(error){showToast('Failed to save edit.');return;}
  isEditing=false;
  msgContentCache[msgId]=newContent;
  editedMsgs.add(msgId);
  const isMine=row.classList.contains('mine');
  bubble.innerHTML=bubbleContent(newContent,isMine,currentMatchId)+'<span class="edited-tag">(edited)</span>';
  showToast('Message updated.');
}

function ctxShowDeleteConfirm(){
  document.getElementById('ctxDeleteItem').style.display='none';
  document.getElementById('ctxEditItem').style.display='none';
  document.getElementById('ctxDeleteConfirm').style.display='block';
}

function cancelDeleteConfirm(){closeMsgContextMenu();}

async function confirmDelete(){
  if(!ctxMsgId||!ctxMsgEl)return;
  const msgId=ctxMsgId,el=ctxMsgEl;
  closeMsgContextMenu();
  const{error}=await sb.from('messages').delete().eq('id',msgId).eq('sender_id',currentUserId);
  if(error){showToast('Failed to delete message.');return;}
  delete msgContentCache[msgId];
  editedMsgs.delete(msgId);
  delete cachedReactions[msgId];
  el.style.transition='opacity .25s,transform .25s';
  el.style.opacity='0';el.style.transform='scale(.95)';
  setTimeout(()=>el.remove(),250);
  showToast('Message deleted.');
}

async function toggleReaction(msgId,emoji){
  const list=cachedReactions[msgId]||[];
  const existing=list.find(r=>r.user_id===currentUserId&&r.emoji===emoji);
  if(existing){
    const{error}=await sb.from('message_reactions')
      .delete().eq('message_id',msgId).eq('user_id',currentUserId).eq('emoji',emoji);
    if(!error)cachedReactions[msgId]=list.filter(r=>!(r.user_id===currentUserId&&r.emoji===emoji));
  }else{
    const{error}=await sb.from('message_reactions')
      .insert({message_id:msgId,user_id:currentUserId,emoji});
    if(!error){
      if(!cachedReactions[msgId])cachedReactions[msgId]=[];
      cachedReactions[msgId].push({message_id:msgId,user_id:currentUserId,emoji});
    }
  }
  const row=document.querySelector(`.msg-row[data-msg-id="${msgId}"]`);
  if(!row)return;
  const rxnDiv=row.querySelector('.msg-reactions');
  if(rxnDiv)rxnDiv.outerHTML=reactionPillsHtml(msgId);
}

async function init(){
  if(window.innerWidth>900&&localStorage.getItem('ss_sidebar')==='0')document.body.classList.add('sidebar-collapsed');
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.replace('/login');return;}
  currentUserId=session.user.id;
  const{data:me,error:meErr}=await sb.from('profiles').select('full_name,username,avatar_url').eq('id',currentUserId).single();
  if(meErr)console.error('Profile load error:',meErr);
  const name=me?.full_name||me?.username||session.user.email.split('@')[0];
  document.getElementById('sidebarName').textContent=name;
  const avatarEl=document.getElementById('sidebarAvatar');
  if(me?.avatar_url){avatarEl.innerHTML=`<img src="${escHtml(me.avatar_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;}
  else{avatarEl.textContent=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);}

  const{data:matches,error}=await sb.from('matches')
    .select(`*, sender:profiles!matches_sender_id_fkey(full_name,username,avatar_url), receiver:profiles!matches_receiver_id_fkey(full_name,username,avatar_url)`)
    .or(`sender_id.eq.${currentUserId},receiver_id.eq.${currentUserId}`)
    .eq('status','accepted')
    .order('updated_at',{ascending:false});
  if(error)console.error('Load convos error:',error);

  const matchArr=matches||[];
  for(const m of matchArr){
    const{data:lastMsg,error:lErr}=await sb.from('messages').select('content,created_at').eq('match_id',m.id).order('created_at',{ascending:false}).limit(1).maybeSingle();
    if(lErr)console.error('Last msg error:',lErr);
    m.last_msg=lastMsg?.content||'';
    m.last_ts=lastMsg?.created_at||m.created_at;
  }
  conversations=matchArr;
  renderConvosList(conversations);

  const params=new URLSearchParams(window.location.search);
  const matchParam=params.get('match');
  if(matchParam){
    const found=conversations.find(c=>c.id===matchParam);
    if(found)openConvo(matchParam);
    else console.error('Match param not found in accepted matches:',matchParam);
  }
  buildEmojiPicker();
}

init();
